[project]
name = "achaean-fleet"
version = "0.1.0"
description = "Container infrastructure for the HomericIntelligence agent mesh"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
just   = ">=1.13"
python = ">=3.11,<3.14"
pytest = ">=8.1.0,<9"

[tasks]
build-all  = "just build-all"
test       = "just test"
test-shell = "just test-shell"
push       = "just push"
pytest     = "python -m pytest tests/ -v"

[feature.dev.dependencies]
bats-core = ">=1.11.0"

[environments]
dev = ["dev"]
