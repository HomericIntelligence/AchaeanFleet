version: 2
updates:
  # GitHub Actions — update action versions in workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "github-actions"

  # Docker base images — bases/ and vessels/
  - package-ecosystem: "docker"
    directory: "/bases"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      base-images:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/vessels/aider"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
