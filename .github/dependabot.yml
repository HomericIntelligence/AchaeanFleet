version: 2
updates:
  # Automated Docker base image version bump PRs
  - package-ecosystem: "docker"
    directory: "/bases"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore(docker)"
    reviewers:
      - "mvillmow"

