name: Shell Script Tests

on:
  push:
    branches: [main]
    paths:
      - '**/*.sh'
      - 'scripts/**'
      - 'tests/**'
  pull_request:
    branches: [main]

jobs:
  shell-tests:
    name: BATS shell tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.1.7

      - name: Install bats-core
        run: sudo apt-get install -y bats

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: shellcheck --severity=warning scripts/*.sh

      - name: Verify notify-proteus.sh default org (fast grep check)
        run: grep -q 'HomericIntelligence' scripts/notify-proteus.sh

      - name: Run notify-proteus BATS tests
        run: bats tests/notify-proteus.bats

      - name: Run build-all BATS tests
        run: bats tests/build-all.bats

      - name: Run entrypoint BATS tests
        run: bats tests/entrypoint.bats

      - name: Run shell tests
        run: bats -r tests/shell/

      - name: Check shell script test coverage
        run: |
          missing=0
          for f in scripts/*.sh; do
            base=$(basename "$f" .sh)
            if ! ls tests/**/*"${base}"* 2>/dev/null | grep -q .; then
              echo "WARNING: No test found for $f"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "::warning::$missing shell script(s) have no corresponding test file"
          fi
