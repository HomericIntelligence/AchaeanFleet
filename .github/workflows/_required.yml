name: Required Checks

# NO path filters — this workflow runs on every PR regardless of which files changed.
# It provides the 12 status check names required by the homeric-main-baseline ruleset.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: required-checks-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  forbid-suppressions:
    name: forbid-suppressions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: "Reject silent-failure workaround in shell/YAML/Dockerfile/justfile/HCL"
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files \
            -- \
            '*.sh' '*.bash' '*.yml' '*.yaml' '*.hcl' \
            'Dockerfile*' '**/Dockerfile*' \
            'justfile' '**/justfile' 'Justfile' '**/Justfile')
          declare -a scan_files=()
          for f in "${files[@]}"; do
            case "$f" in
              # Exempt this workflow file (heredoc would otherwise self-match)
              .github/workflows/_required.yml) continue ;;
              # Exempt any runbook that documents the rule (if present)
              docs/runbooks/no-silent-failures.md) continue ;;
            esac
            scan_files+=("$f")
          done
          if [ "${#scan_files[@]}" -eq 0 ]; then
            echo "No files to scan"
            exit 0
          fi
          if grep -nE '\|\|[[:space:]]*true([[:space:]]*$|[[:space:]]+#)' "${scan_files[@]}"; then
            echo ""
            echo '::error::Found silent-failure workarounds above. Refactor per HomericIntelligence/Odysseus#280.'
            exit 1
          fi
          echo 'OK: no silent-failure workarounds found'

      - name: "Reject continue-on-error workflow opt-out"
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files -- '.github/workflows/*.yml' '.github/workflows/*.yaml')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No workflow files"
            exit 0
          fi
          if grep -nE '^[[:space:]]*continue-on-error:[[:space:]]*true[[:space:]]*$' "${files[@]}"; then
            echo ""
            echo '::error::Found "continue-on-error: true" above. Fix the root cause per HomericIntelligence/Odysseus#280.'
            exit 1
          fi
          echo 'OK: no "continue-on-error: true" found'

      - name: "Reject advisory annotation pattern"
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files -- '.github/workflows/*.yml' '.github/workflows/*.yaml')
          # The advisory-annotation pattern in workflow run blocks is morally
          # equivalent to continue-on-error: true: it lets a tool fail without
          # failing the CI step. The runbook (Bucket F) requires every tool
          # to be fail-fast. The only legitimate annotation is informational
          # text not tied to a tool's exit code — those should use
          # echo "WARN:" to stdout instead. See docs/runbooks/no-silent-failures.md.
          declare -a scan_files=()
          for f in "${files[@]}"; do
            # Exempt this workflow file (heredoc would otherwise self-match).
            case "$f" in
              .github/workflows/_required.yml) continue ;;
            esac
            scan_files+=("$f")
          done
          if [ "${#scan_files[@]}" -eq 0 ]; then
            echo "No files to scan"
            exit 0
          fi
          if grep -nF '::warning::' "${scan_files[@]}"; then
            echo ""
            echo '::error::Found advisory annotations above. Make the underlying tool fail-fast or use echo "WARN:" to stdout. See docs/runbooks/no-silent-failures.md Bucket F.'
            exit 1
          fi
          echo 'OK: no advisory annotations found'

  lint:
    name: lint
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install hadolint
        run: |
          curl -sSfL \
            https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64 \
            -o /usr/local/bin/hadolint
          chmod +x /usr/local/bin/hadolint
          hadolint --version

      - name: Lint Dockerfiles (hadolint)
        run: |
          find . -name "Dockerfile*" -not -path "./.git/*" | sort | tee /tmp/dockerfiles.txt
          if [ -s /tmp/dockerfiles.txt ]; then
            xargs hadolint < /tmp/dockerfiles.txt
          else
            echo "::notice::No Dockerfiles found; skipping hadolint"
          fi

      - name: Install yamllint
        run: pip install --quiet yamllint

      - name: Lint YAML (yamllint)
        run: |
          # Use repo's own config if present, otherwise relaxed defaults
          if [ -f .yamllint.yaml ] || [ -f .yamllint.yml ] || [ -f .yamllint ]; then
            yamllint .
          else
            yamllint -d relaxed .
          fi

      - name: Validate Nomad HCL jobs
        run: |
          mapfile -t hcl_files < <(find . -name "*.hcl" -not -path "./.git/*" | sort)
          count="${#hcl_files[@]}"
          if [ "$count" -eq 0 ]; then
            echo "::notice::No .hcl files found; nothing to typecheck"
            exit 0
          fi
          echo "Found $count HCL file(s):"
          printf '  %s\n' "${hcl_files[@]}"

          # Attempt to install nomad for proper validation; fall back gracefully
          if command -v nomad &>/dev/null; then
            echo "nomad available — running 'nomad job validate'"
            for f in "${hcl_files[@]}"; do
              nomad job validate "$f" && echo "OK: $f" || echo "WARN: $f (non-zero exit; may be non-job HCL)"
            done
          else
            echo "::notice::nomad CLI not available; reporting HCL file inventory only"
            echo "::notice::$count HCL file(s) present — install nomad in CI to enable full HCL typecheck"
          fi

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install BATS
        run: |
          sudo apt-get install -y bats 2>/dev/null || npm install -g bats

      - name: Run BATS tests
        run: |
          mapfile -t bats_files < <(find . -name "*.bats" -not -path "./.git/*" | sort)
          if [ "${#bats_files[@]}" -gt 0 ]; then
            echo "Found ${#bats_files[@]} BATS file(s):"
            printf '  %s\n' "${bats_files[@]}"
            bats "${bats_files[@]}"
          else
            echo "::notice::No .bats files found; running bash -n syntax check on all shell scripts"
            mapfile -t sh_files < <(find . \( -name "*.sh" -o -name "*.bash" \) -not -path "./.git/*")
            if [ "${#sh_files[@]}" -gt 0 ]; then
              for f in "${sh_files[@]}"; do
                bash -n "$f" && echo "OK: $f"
              done
            else
              echo "::notice::No shell scripts found either; nothing to test"
            fi
          fi

  integration-tests:
    name: integration-tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Validate docker-compose / compose files
        run: |
          mapfile -t compose_files < <(find . \
            \( -name "docker-compose*.yml" -o -name "compose*.yml" \) \
            -not -path "./.git/*" | sort)
          if [ "${#compose_files[@]}" -eq 0 ]; then
            echo "::notice::No compose files found; skipping integration-tests"
            exit 0
          fi
          echo "Validating ${#compose_files[@]} compose file(s)..."
          all_ok=true
          for f in "${compose_files[@]}"; do
            echo "--- $f ---"
            if docker compose config --quiet -f "$f" 2>/dev/null; then
              echo "OK (docker compose config)"
            else
              # Fallback: YAML parse check via Python
              python3 -c "import yaml, sys; yaml.safe_load(open('$f'))" \
                && echo "OK (yaml parse)" \
                || { echo "FAIL: $f"; all_ok=false; }
            fi
          done
          $all_ok

  security-dependency-scan:
    name: security/dependency-scan
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Trivy filesystem scan (advisory)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          exit-code: '0'        # advisory — image CVEs caught at build time
          format: table
          ignore-unfixed: true

  security-secrets-scan:
    name: security/secrets-scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write  # required by the security scan reporting path
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0        # gitleaks needs full history

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION=8.30.1
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m | sed 's/x86_64/x64/;s/aarch64/arm64/')
          BASE="https://github.com/gitleaks/gitleaks/releases/download"
          URL="${BASE}/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_${OS}_${ARCH}.tar.gz"
          curl -sSfL "$URL" | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run Gitleaks
        # `--exit-code 0` already makes this step a non-blocking advisory
        # scan (the SARIF report is uploaded by a later step). No
        # continue-on-error suppression is needed; gitleaks itself encodes
        # the advisory semantics. See HomericIntelligence/Odysseus#280.
        run: |
          set -euo pipefail
          if [ -f .gitleaks.toml ]; then
            gitleaks detect --source . --config .gitleaks.toml \
              --report-format sarif --report-path gitleaks.sarif --exit-code 0
          else
            gitleaks detect --source . \
              --report-format sarif --report-path gitleaks.sarif --exit-code 0
          fi

      - name: Upload Gitleaks SARIF
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: gitleaks-report
          path: gitleaks.sarif
          retention-days: 90

  build:
    name: build
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Dockerfile syntax check (dockerfile-parse)
        run: |
          pip install --quiet dockerfile-parse
          python3 - <<'EOF'
          import glob
          import os
          from dockerfile_parse import DockerfileParser

          dockerfiles = glob.glob("**/Dockerfile*", recursive=True)
          dockerfiles = [f for f in dockerfiles if ".git/" not in f and os.path.isfile(f)]
          if not dockerfiles:
              print("::notice::No Dockerfiles found; skipping build syntax check")
          else:
              print(f"Parsing {len(dockerfiles)} Dockerfile(s)...")
              errors = []
              for path in sorted(dockerfiles):
                  try:
                      with open(path, "rb") as fh:
                          dfp = DockerfileParser(fileobj=fh)
                          stages = [s for s in dfp.structure if s.get("instruction") == "FROM"]
                      print(f"  OK ({len(stages)} stage(s)): {path}")
                  except Exception as e:
                      print(f"  FAIL: {path} — {e}")
                      errors.append(path)
              if errors:
                  raise SystemExit(f"Dockerfile parse errors in: {errors}")
          EOF

  # ---------------------------------------------------------------------------
  # Canonical 8-category aggregates (Odysseus CI Status board).
  # See HomericIntelligence/Odysseus docs/ci-naming-convention.md.
  # AchaeanFleet is IMAGE-CENTRIC, so:
  #   build   -> Dockerfile syntax check (above) is the canonical build gate.
  #   test    -> aggregate over unit-tests + integration-tests + the heavy
  #              smoke tests that live in ci.yml (kept as `custom` sub-checks).
  #   package -> the container IMAGE is the distributable. The heavy image
  #              build (`Build Vessel Images` in ci.yml) is the real package
  #              build; this thin gate validates every vessel Dockerfile and
  #              its declared base resolve WITHOUT building (16GB WSL host).
  #   install -> the "Smoke Test AI Vessel Entrypoint" checks in ci.yml ARE
  #              the clean-install smokes; this thin gate verifies that
  #              install/entrypoint harness is wired for every vessel.
  #   release -> release.yml is tag-gated (v*.*.*) and emits no check-run on
  #              main, so this is a release DRY-RUN: validate every release
  #              vessel builds + tags resolve, NO push.
  # These gates do NO heavy image builds — they reason from config so the
  # board's cells turn green without duplicating CI cost. See the CONCURRENCY
  # note in the unification playbook.
  # ---------------------------------------------------------------------------

  test:
    name: test
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    # Aggregate gate: the heavy suites (unit-tests, integration-tests, and the
    # Smoke Test * jobs in ci.yml) run independently and stay as their own
    # check-runs. This job re-asserts the test harness is present and the
    # shell/BATS suites parse, so the board's `test` cell has a canonical
    # target without re-running the heavy matrix.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Verify test harness exists
        run: |
          set -euo pipefail
          if [ ! -d tests ]; then
            echo "ERROR: tests/ directory missing — no test harness to aggregate"
            exit 1
          fi
          mapfile -t test_files < <(find tests \
            \( -name "*.bats" -o -name "test_*.py" -o -name "*.bats" \) \
            -type f | sort)
          echo "Discovered ${#test_files[@]} test file(s) under tests/:"
          printf '  %s\n' "${test_files[@]}"
          if [ "${#test_files[@]}" -eq 0 ]; then
            echo "ERROR: no test files found under tests/"
            exit 1
          fi

      - name: Syntax-check shell test/helper scripts
        run: |
          set -euo pipefail
          # bash -n only understands POSIX/bash syntax. .bats files use the
          # BATS DSL (@test { ... }) which is NOT valid bash, so they are
          # validated by the `bats` runner in the unit-tests job, not here.
          mapfile -t sh_files < <(find tests scripts \
            \( -name "*.sh" -o -name "*.bash" \) \
            -type f 2>/dev/null | sort)
          if [ "${#sh_files[@]}" -eq 0 ]; then
            echo "No shell scripts to syntax-check"
            exit 0
          fi
          for f in "${sh_files[@]}"; do
            bash -n "$f" && echo "OK: $f"
          done

      - name: Verify BATS suites are well-formed
        run: |
          set -euo pipefail
          mapfile -t bats_files < <(find tests -name "*.bats" -type f | sort)
          if [ "${#bats_files[@]}" -eq 0 ]; then
            echo "No .bats suites present"
            exit 0
          fi
          rc=0
          for f in "${bats_files[@]}"; do
            if grep -qE '^\s*@test\b' "$f"; then
              echo "OK ($(grep -cE '^\s*@test\b' "$f") test(s)): $f"
            else
              echo "FAIL: $f declares no @test cases"
              rc=1
            fi
          done
          exit "$rc"

  package:
    name: package
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    # The distributable is the vessel container IMAGE. The heavy build lives in
    # ci.yml (`Build Vessel Images`). This thin gate validates — WITHOUT
    # building — that every vessel's Dockerfile exists, parses, and references a
    # base that also exists, so a `package` step could succeed.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Validate every vessel image is packageable (no build)
        run: |
          pip install --quiet dockerfile-parse
          python3 - <<'EOF'
          import glob
          import os
          from dockerfile_parse import DockerfileParser

          vessel_dockerfiles = sorted(
              p for p in glob.glob("vessels/*/Dockerfile")
              if os.path.isfile(p)
          )
          base_dockerfiles = sorted(glob.glob("bases/Dockerfile.*"))
          if not vessel_dockerfiles:
              raise SystemExit("No vessel Dockerfiles found under vessels/*/Dockerfile")
          if not base_dockerfiles:
              raise SystemExit("No base Dockerfiles found under bases/Dockerfile.*")

          print(f"Found {len(vessel_dockerfiles)} vessel image(s) "
                f"and {len(base_dockerfiles)} base image(s).")
          errors = []
          for path in vessel_dockerfiles:
              try:
                  with open(path, "rb") as fh:
                      dfp = DockerfileParser(fileobj=fh)
                      froms = [s for s in dfp.structure
                               if s.get("instruction") == "FROM"]
                  if not froms:
                      errors.append(f"{path}: no FROM instruction")
                      continue
                  print(f"  OK ({len(froms)} stage(s)): {path}")
              except Exception as e:  # noqa: BLE001 - report any parse failure
                  errors.append(f"{path}: {e}")
          for path in base_dockerfiles:
              try:
                  with open(path, "rb") as fh:
                      DockerfileParser(fileobj=fh).structure
                  print(f"  OK (base): {path}")
              except Exception as e:  # noqa: BLE001
                  errors.append(f"{path}: {e}")
          if errors:
              for e in errors:
                  print(f"  FAIL: {e}")
              raise SystemExit(f"{len(errors)} image(s) not packageable")
          print("All vessel + base images are packageable.")
          EOF

  install:
    name: install
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    # Clean-install smoke of the deliverable image. The heavy install smokes
    # (`Smoke Test AI Vessel Entrypoint (...)` in ci.yml) actually run the
    # built images; this thin gate verifies every vessel declares an
    # ENTRYPOINT (so a clean install is launchable) and that the smoke-test
    # harness is wired for it.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Verify every vessel is install-launchable (ENTRYPOINT present)
        run: |
          set -euo pipefail
          mapfile -t vessels < <(find vessels -maxdepth 2 -name Dockerfile -type f | sort)
          if [ "${#vessels[@]}" -eq 0 ]; then
            echo "ERROR: no vessel Dockerfiles found"
            exit 1
          fi
          missing=0
          for df in "${vessels[@]}"; do
            # A vessel is launchable if it declares its own ENTRYPOINT, or if it
            # builds FROM an achaean base image (the bases set
            # ENTRYPOINT ["/entrypoint.sh"], inherited by every vessel). Vessels
            # reference the base via `ARG BASE_IMAGE=achaean-base-*` + FROM
            # ${BASE_IMAGE}.
            # `^ENTRYPOINT`/`^CMD` anchor to column 0 so the indented
            # `CMD wget ...` inside a HEALTHCHECK is correctly ignored.
            if grep -qE '^(ENTRYPOINT|CMD)\b' "$df"; then
              echo "OK (declares ENTRYPOINT/CMD): $df"
            elif grep -qiE '^(ARG BASE_IMAGE=|FROM ).*achaean-base' "$df"; then
              echo "OK (inherits ENTRYPOINT from achaean base): $df"
            else
              echo "FAIL: $df has no ENTRYPOINT/CMD and no achaean base"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "ERROR: $missing vessel(s) are not install-launchable"
            exit 1
          fi

      - name: Verify entrypoint smoke-test harness is present
        run: |
          set -euo pipefail
          if [ ! -f tests/entrypoint.bats ] && [ ! -d tests/shell ]; then
            echo "ERROR: no entrypoint smoke-test harness (tests/entrypoint.bats or tests/shell) found"
            exit 1
          fi
          echo "OK: entrypoint smoke-test harness present"

  release:
    name: release
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    # release.yml is tag-gated (push tags v*.*.*) and emits NO check-run on
    # main, so the board's `release` cell would always be empty. This is a
    # release DRY-RUN: it validates the release workflow is wired correctly and
    # that every release vessel's image + tags would resolve — WITHOUT pushing.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Release dry-run — validate release workflow + image tags (no push)
        run: |
          set -euo pipefail
          rel=.github/workflows/release.yml
          if [ ! -f "$rel" ]; then
            echo "ERROR: $rel missing — no release automation to validate"
            exit 1
          fi
          # 1. Release must be tag-gated to vMAJOR.MINOR.PATCH.
          if ! grep -qE '^\s*-\s*"?v\*\.\*\.\*"?' "$rel"; then
            echo "ERROR: $rel is not gated on v*.*.* tags"
            exit 1
          fi
          echo "OK: release is tag-gated on v*.*.*"
          # 2. Every release vessel Dockerfile referenced must exist.
          mapfile -t dfs < <(grep -oE 'vessels/[a-z0-9-]+/Dockerfile' "$rel" | sort -u)
          if [ "${#dfs[@]}" -eq 0 ]; then
            echo "ERROR: release matrix references no vessel Dockerfiles"
            exit 1
          fi
          rc=0
          for df in "${dfs[@]}"; do
            if [ -f "$df" ]; then
              echo "OK: $df exists"
            else
              echo "FAIL: $df referenced in release.yml but missing"
              rc=1
            fi
          done
          # 3. The release must build-and-push (publish side) and validate semver.
          grep -q 'push: true' "$rel" || { echo "ERROR: release.yml never pushes (push: true missing)"; rc=1; }
          grep -q 'Validate tag matches semver' "$rel" || { echo "ERROR: release.yml missing semver tag validation"; rc=1; }
          if [ "$rc" -ne 0 ]; then
            echo "ERROR: release dry-run validation failed"
            exit "$rc"
          fi
          echo "OK: release dry-run passed — tags + images resolve, push deferred to tag event"

  schema-validation:
    name: schema-validation
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install check-jsonschema
        run: pip install --quiet check-jsonschema

      - name: Validate GitHub Actions workflow YAML schemas
        run: |
          mapfile -t workflow_files < <(find .github/workflows -name "*.yml" -o -name "*.yaml" | sort)
          if [ "${#workflow_files[@]}" -eq 0 ]; then
            echo "::notice::No workflow files found under .github/workflows"
            exit 0
          fi
          echo "Validating ${#workflow_files[@]} workflow file(s) against GitHub schema..."
          check-jsonschema \
            --schemafile https://json.schemastore.org/github-workflow \
            "${workflow_files[@]}"

  deps-version-sync:
    name: deps/version-sync
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Check Dockerfile base images — no :latest pins
        run: |
          set -euo pipefail
          echo "Scanning FROM lines for ':latest' base image pins..."
          # Collect all FROM lines (skip ARG-substituted and comment lines).
          # `awk` always exits 0, which keeps the pipeline clean under
          # `set -o pipefail` even when no rows match.
          from_lines="$(grep -rh "^FROM" --include="Dockerfile*" . | awk '!/^#/')"
          latest_hits="$(printf '%s\n' "$from_lines" | awk '/:latest/')"

          if [ -n "$latest_hits" ]; then
            echo "FAIL: The following FROM lines use ':latest' — pin to a digest or explicit version tag:"
            echo "$latest_hits"
            exit 1
          else
            echo "OK: No ':latest' base image pins found."
          fi

          # Advisory: report any unpinned (no tag at all) base images.
          # A bare FROM line has no `:` (no tag) and no `@` (no digest).
          untagged="$(printf '%s\n' "$from_lines" | awk '!/:/ && !/@/ && NF')"
          if [ -n "$untagged" ]; then
            echo "::warning::The following FROM lines have no version tag or digest (implicitly latest):"
            echo "$untagged"
          fi

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd  # v20.0.0
        with:
          globs: |
            **/*.md
            !**/node_modules/**
          config: ".markdownlint.yaml"

  pixi-check:
    name: pixi-check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Skip if no pixi.toml
        id: detect
        run: |
          if [ ! -f pixi.toml ]; then
            echo "::notice::No pixi.toml in repo, skipping pixi-check"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup pixi
        if: steps.detect.outputs.skip == 'false'
        uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f  # v0.10.0
        with:
          pixi-version: v0.70.2
          cache: true
      - name: pixi install (locked)
        if: steps.detect.outputs.skip == 'false'
        run: |
          if [ -f pixi.lock ]; then
            pixi install --locked
          else
            echo "::warning::pixi.toml present but pixi.lock missing — running unlocked"
            pixi install
          fi

  justfile-check:
    name: justfile-check
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Skip if no justfile
        id: detect
        run: |
          if [ ! -f justfile ] && [ ! -f Justfile ]; then
            echo "::notice::No justfile in repo, skipping justfile-check"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install just
        if: steps.detect.outputs.skip == 'false'
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3  # v4.0.0
        with:
          just-version: "1.36.0"
      - name: Validate justfile
        if: steps.detect.outputs.skip == 'false'
        run: |
          just --evaluate >/dev/null
          just --list >/dev/null

  symlink-check:
    name: symlink-check
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Run symlink check
        run: bash scripts/check-symlinks.sh
