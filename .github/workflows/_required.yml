name: Required Checks

# NO path filters — this workflow runs on every PR regardless of which files changed.
# It provides the 9 canonical status check names required by the homeric-main-baseline ruleset.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: required-checks-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write  # needed by gitleaks-action

jobs:
  forbid-suppressions:
    name: forbid-suppressions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: "Reject silent-failure workaround in shell/YAML/Dockerfile/justfile/HCL"
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files \
            -- \
            '*.sh' '*.bash' '*.yml' '*.yaml' '*.hcl' \
            'Dockerfile*' '**/Dockerfile*' \
            'justfile' '**/justfile' 'Justfile' '**/Justfile')
          declare -a scan_files=()
          for f in "${files[@]}"; do
            case "$f" in
              # Exempt this workflow file (heredoc would otherwise self-match)
              .github/workflows/_required.yml) continue ;;
              # Exempt any runbook that documents the rule (if present)
              docs/runbooks/no-silent-failures.md) continue ;;
            esac
            scan_files+=("$f")
          done
          if [ "${#scan_files[@]}" -eq 0 ]; then
            echo "No files to scan"
            exit 0
          fi
          if grep -nE '\|\|[[:space:]]*true([[:space:]]*$|[[:space:]]+#)' "${scan_files[@]}"; then
            echo ""
            echo '::error::Found silent-failure workarounds above. Refactor per HomericIntelligence/Odysseus#280.'
            exit 1
          fi
          echo 'OK: no silent-failure workarounds found'

      - name: "Reject continue-on-error workflow opt-out"
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files -- '.github/workflows/*.yml' '.github/workflows/*.yaml')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No workflow files"
            exit 0
          fi
          if grep -nE '^[[:space:]]*continue-on-error:[[:space:]]*true[[:space:]]*$' "${files[@]}"; then
            echo ""
            echo '::error::Found "continue-on-error: true" above. Fix the root cause per HomericIntelligence/Odysseus#280.'
            exit 1
          fi
          echo 'OK: no "continue-on-error: true" found'

  lint:
    name: lint
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install hadolint
        run: |
          curl -sSfL \
            https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64 \
            -o /usr/local/bin/hadolint
          chmod +x /usr/local/bin/hadolint
          hadolint --version

      - name: Lint Dockerfiles (hadolint)
        run: |
          find . -name "Dockerfile*" -not -path "./.git/*" | sort | tee /tmp/dockerfiles.txt
          if [ -s /tmp/dockerfiles.txt ]; then
            xargs hadolint < /tmp/dockerfiles.txt
          else
            echo "::notice::No Dockerfiles found; skipping hadolint"
          fi

      - name: Install yamllint
        run: pip install --quiet yamllint

      - name: Lint YAML (yamllint)
        run: |
          # Use repo's own config if present, otherwise relaxed defaults
          if [ -f .yamllint.yaml ] || [ -f .yamllint.yml ] || [ -f .yamllint ]; then
            yamllint .
          else
            yamllint -d relaxed .
          fi

      - name: Validate Nomad HCL jobs
        run: |
          mapfile -t hcl_files < <(find . -name "*.hcl" -not -path "./.git/*" | sort)
          count="${#hcl_files[@]}"
          if [ "$count" -eq 0 ]; then
            echo "::notice::No .hcl files found; nothing to typecheck"
            exit 0
          fi
          echo "Found $count HCL file(s):"
          printf '  %s\n' "${hcl_files[@]}"

          # Attempt to install nomad for proper validation; fall back gracefully
          if command -v nomad &>/dev/null; then
            echo "nomad available — running 'nomad job validate'"
            for f in "${hcl_files[@]}"; do
              nomad job validate "$f" && echo "OK: $f" || echo "WARN: $f (non-zero exit; may be non-job HCL)"
            done
          else
            echo "::notice::nomad CLI not available; reporting HCL file inventory only"
            echo "::notice::$count HCL file(s) present — install nomad in CI to enable full HCL typecheck"
          fi

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install BATS
        run: |
          sudo apt-get install -y bats 2>/dev/null || npm install -g bats

      - name: Run BATS tests
        run: |
          mapfile -t bats_files < <(find . -name "*.bats" -not -path "./.git/*" | sort)
          if [ "${#bats_files[@]}" -gt 0 ]; then
            echo "Found ${#bats_files[@]} BATS file(s):"
            printf '  %s\n' "${bats_files[@]}"
            bats "${bats_files[@]}"
          else
            echo "::notice::No .bats files found; running bash -n syntax check on all shell scripts"
            mapfile -t sh_files < <(find . \( -name "*.sh" -o -name "*.bash" \) -not -path "./.git/*")
            if [ "${#sh_files[@]}" -gt 0 ]; then
              for f in "${sh_files[@]}"; do
                bash -n "$f" && echo "OK: $f"
              done
            else
              echo "::notice::No shell scripts found either; nothing to test"
            fi
          fi

  integration-tests:
    name: integration-tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose / compose files
        run: |
          mapfile -t compose_files < <(find . \
            \( -name "docker-compose*.yml" -o -name "compose*.yml" \) \
            -not -path "./.git/*" | sort)
          if [ "${#compose_files[@]}" -eq 0 ]; then
            echo "::notice::No compose files found; skipping integration-tests"
            exit 0
          fi
          echo "Validating ${#compose_files[@]} compose file(s)..."
          all_ok=true
          for f in "${compose_files[@]}"; do
            echo "--- $f ---"
            if docker compose config --quiet -f "$f" 2>/dev/null; then
              echo "OK (docker compose config)"
            else
              # Fallback: YAML parse check via Python
              python3 -c "import yaml, sys; yaml.safe_load(open('$f'))" \
                && echo "OK (yaml parse)" \
                || { echo "FAIL: $f"; all_ok=false; }
            fi
          done
          $all_ok

  security-dependency-scan:
    name: security/dependency-scan
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan (advisory)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8  # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          exit-code: '0'        # advisory — image CVEs caught at build time
          format: table
          ignore-unfixed: true

  security-secrets-scan:
    name: security/secrets-scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # gitleaks needs full history

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION=8.30.1
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m | sed 's/x86_64/x64/;s/aarch64/arm64/')
          BASE="https://github.com/gitleaks/gitleaks/releases/download"
          URL="${BASE}/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_${OS}_${ARCH}.tar.gz"
          curl -sSfL "$URL" | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run Gitleaks
        # `--exit-code 0` already makes this step a non-blocking advisory
        # scan (the SARIF report is uploaded by a later step). No
        # continue-on-error suppression is needed; gitleaks itself encodes
        # the advisory semantics. See HomericIntelligence/Odysseus#280.
        run: |
          set -euo pipefail
          if [ -f .gitleaks.toml ]; then
            gitleaks detect --source . --config .gitleaks.toml \
              --report-format sarif --report-path gitleaks.sarif --exit-code 0
          else
            gitleaks detect --source . \
              --report-format sarif --report-path gitleaks.sarif --exit-code 0
          fi

      - name: Upload Gitleaks SARIF
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: actions/upload-artifact@v7
        with:
          name: gitleaks-report
          path: gitleaks.sarif
          retention-days: 90

  build:
    name: build
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Dockerfile syntax check (dockerfile-parse)
        run: |
          pip install --quiet dockerfile-parse
          python3 - <<'EOF'
          import glob
          import os
          from dockerfile_parse import DockerfileParser

          dockerfiles = glob.glob("**/Dockerfile*", recursive=True)
          dockerfiles = [f for f in dockerfiles if ".git/" not in f and os.path.isfile(f)]
          if not dockerfiles:
              print("::notice::No Dockerfiles found; skipping build syntax check")
          else:
              print(f"Parsing {len(dockerfiles)} Dockerfile(s)...")
              errors = []
              for path in sorted(dockerfiles):
                  try:
                      with open(path, "rb") as fh:
                          dfp = DockerfileParser(fileobj=fh)
                          stages = [s for s in dfp.structure if s.get("instruction") == "FROM"]
                      print(f"  OK ({len(stages)} stage(s)): {path}")
                  except Exception as e:
                      print(f"  FAIL: {path} — {e}")
                      errors.append(path)
              if errors:
                  raise SystemExit(f"Dockerfile parse errors in: {errors}")
          EOF

  schema-validation:
    name: schema-validation
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install check-jsonschema
        run: pip install --quiet check-jsonschema

      - name: Validate GitHub Actions workflow YAML schemas
        run: |
          mapfile -t workflow_files < <(find .github/workflows -name "*.yml" -o -name "*.yaml" | sort)
          if [ "${#workflow_files[@]}" -eq 0 ]; then
            echo "::notice::No workflow files found under .github/workflows"
            exit 0
          fi
          echo "Validating ${#workflow_files[@]} workflow file(s) against GitHub schema..."
          check-jsonschema \
            --schemafile https://json.schemastore.org/github-workflow \
            "${workflow_files[@]}"

  deps-version-sync:
    name: deps/version-sync
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Check Dockerfile base images — no :latest pins
        run: |
          set -euo pipefail
          echo "Scanning FROM lines for ':latest' base image pins..."
          # Collect all FROM lines (skip ARG-substituted and comment lines).
          # `awk` always exits 0, which keeps the pipeline clean under
          # `set -o pipefail` even when no rows match.
          from_lines="$(grep -rh "^FROM" --include="Dockerfile*" . | awk '!/^#/')"
          latest_hits="$(printf '%s\n' "$from_lines" | awk '/:latest/')"

          if [ -n "$latest_hits" ]; then
            echo "FAIL: The following FROM lines use ':latest' — pin to a digest or explicit version tag:"
            echo "$latest_hits"
            exit 1
          else
            echo "OK: No ':latest' base image pins found."
          fi

          # Advisory: report any unpinned (no tag at all) base images.
          # A bare FROM line has no `:` (no tag) and no `@` (no digest).
          untagged="$(printf '%s\n' "$from_lines" | awk '!/:/ && !/@/ && NF')"
          if [ -n "$untagged" ]; then
            echo "::warning::The following FROM lines have no version tag or digest (implicitly latest):"
            echo "$untagged"
          fi

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@05f32210e84442804257b2a6f20b273450ec8265  # v20.0.0
        with:
          globs: "**/*.md"
          config: ".markdownlint.yaml"

  pixi-check:
    name: pixi-check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Skip if no pixi.toml
        id: detect
        run: |
          if [ ! -f pixi.toml ]; then
            echo "::notice::No pixi.toml in repo, skipping pixi-check"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup pixi
        if: steps.detect.outputs.skip == 'false'
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.67.2
          cache: true
      - name: pixi install (locked)
        if: steps.detect.outputs.skip == 'false'
        run: |
          if [ -f pixi.lock ]; then
            pixi install --locked
          else
            echo "::warning::pixi.toml present but pixi.lock missing — running unlocked"
            pixi install
          fi

  justfile-check:
    name: justfile-check
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Skip if no justfile
        id: detect
        run: |
          if [ ! -f justfile ] && [ ! -f Justfile ]; then
            echo "::notice::No justfile in repo, skipping justfile-check"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install just
        if: steps.detect.outputs.skip == 'false'
        uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6  # v2.0.0
        with:
          just-version: "1.36.0"
      - name: Validate justfile
        if: steps.detect.outputs.skip == 'false'
        run: |
          just --evaluate >/dev/null
          just --list >/dev/null

  symlink-check:
    name: symlink-check
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run symlink check
        run: bash scripts/check-symlinks.sh
