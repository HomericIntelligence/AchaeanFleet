name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'package.json'
      - '**/package.json'
      - 'pixi.toml'
      - 'dagger/**'
      - '**/*.lock'
  schedule:
    - cron: '0 3 * * 1'   # Weekly Monday 03:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  scan-fs:
    name: Trivy filesystem scan (deps + secrets)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trivy filesystem scan (deps + secrets)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL

      - name: Trivy filesystem scan (SARIF for Security tab)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  scan-bases:
    name: Trivy image scan (base images)
    runs-on: ubuntu-latest
    needs: [scan-fs]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Pull and scan base images
        run: |
          for img in achaean-base-node achaean-base-python achaean-base-minimal; do
            echo "Pulling ghcr.io/homericintelligence/${img}:latest..."
            docker pull "ghcr.io/homericintelligence/${img}:latest" 2>/dev/null || \
              echo "WARNING: ${img} not found in GHCR, skipping"
          done
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.35.0
        with:
          scan-type: image
          image-ref: ghcr.io/homericintelligence/achaean-base-node:latest
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: HIGH,CRITICAL
