name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'package.json'
      - '**/package.json'
      - 'pixi.toml'
      - 'dagger/**'
      - '**/*.lock'
  schedule:
    - cron: '0 3 * * 1'   # Weekly Monday 03:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  scan-fs:
    name: Trivy filesystem scan (deps + secrets)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.1.7
        with:
          fetch-depth: 0

      - name: Trivy filesystem scan (deps + secrets)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8  # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL

      - name: Trivy filesystem scan (SARIF for Security tab)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8  # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a  # v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  scan-bases:
    name: Trivy image scan (base images)
    runs-on: ubuntu-latest
    needs: [scan-fs]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.1.7
      - name: Pull base images
        id: pull_images
        run: |
          available=""
          for img in achaean-base-node achaean-base-python achaean-base-minimal; do
            echo "Pulling ghcr.io/homericintelligence/${img}:latest..."
            if docker pull "ghcr.io/homericintelligence/${img}:latest" 2>/dev/null; then
              available="${available} ${img}"
            else
              echo "WARNING: ${img} not found in GHCR, skipping"
            fi
          done
          if [ -z "$available" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Trivy image scan — achaean-base-node
        if: steps.pull_images.outputs.available == 'true'
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8  # v0.36.0
        with:
          scan-type: image
          image-ref: ghcr.io/homericintelligence/achaean-base-node:latest
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Trivy image scan — achaean-base-python
        if: steps.pull_images.outputs.available == 'true'
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8  # v0.36.0
        with:
          scan-type: image
          image-ref: ghcr.io/homericintelligence/achaean-base-python:latest
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Trivy image scan — achaean-base-minimal
        if: steps.pull_images.outputs.available == 'true'
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8  # v0.36.0
        with:
          scan-type: image
          image-ref: ghcr.io/homericintelligence/achaean-base-minimal:latest
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: HIGH,CRITICAL
