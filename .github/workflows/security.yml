name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'package.json'
      - '**/package.json'
      - 'pixi.toml'
      - 'dagger/**'
      - '**/*.lock'
  schedule:
    - cron: '0 3 * * 1'   # Weekly Monday 03:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  scan-fs:
    name: Trivy filesystem scan (deps + secrets)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - name: Trivy filesystem scan (deps + secrets)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL

      - name: Trivy filesystem scan (SARIF for Security tab)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  scan-bases:
    name: Trivy image scan (base images)
    runs-on: ubuntu-latest
    needs: [scan-fs]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Pull base images
        id: pull_images
        run: |
          available=""
          for img in achaean-base-node achaean-base-python achaean-base-minimal; do
            echo "Pulling ghcr.io/homericintelligence/${img}:latest..."
            if docker pull "ghcr.io/homericintelligence/${img}:latest" 2>/dev/null; then
              available="${available} ${img}"
            else
              echo "WARNING: ${img} not found in GHCR, skipping"
            fi
          done
          if [ -z "$available" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Trivy image scan — achaean-base-node
        if: steps.pull_images.outputs.available == 'true'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: image
          image-ref: ghcr.io/homericintelligence/achaean-base-node:latest
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Trivy image scan — achaean-base-python
        if: steps.pull_images.outputs.available == 'true'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: image
          image-ref: ghcr.io/homericintelligence/achaean-base-python:latest
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Trivy image scan — achaean-base-minimal
        if: steps.pull_images.outputs.available == 'true'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: image
          image-ref: ghcr.io/homericintelligence/achaean-base-minimal:latest
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: HIGH,CRITICAL
