name: Build All Agent Images

on:
  push:
    branches: [main]
    paths:
      - 'bases/**'
      - 'vessels/**'
      - 'dagger/**'
      - 'compose/**'
      - 'tests/**'
      - '.github/workflows/**'
      - 'nomad/**'
      - 'pods/**'
      - 'scripts/**'
      - '**/*.md'
      - 'justfile'
      - 'pixi.toml'
      - 'pixi.lock'
  pull_request:
    branches: [main]
    paths:
      - 'bases/**'
      - 'vessels/**'
      - 'dagger/**'
      - 'compose/**'
      - 'tests/**'
      - '.github/workflows/**'
      - 'nomad/**'
      - 'pods/**'
      - 'scripts/**'
      - '**/*.md'
      - 'justfile'
      - 'pixi.toml'
      - 'pixi.lock'
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 06:00 UTC — digest freshness check

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-nomad:
    name: Validate Nomad Job HCL
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.1.7

      - name: Cache Nomad binary
        id: cache-nomad
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.0.2
        with:
          path: /usr/local/bin/nomad
          key: nomad-${{ env.NOMAD_VERSION }}

      - name: Install Nomad
        if: steps.cache-nomad.outputs.cache-hit != 'true'
        env:
          NOMAD_VERSION: "1.9.7"
        run: |
          curl -fsSL "https://releases.hashicorp.com/nomad/${NOMAD_VERSION}/nomad_${NOMAD_VERSION}_linux_amd64.zip" \
            -o /tmp/nomad.zip
          unzip -q /tmp/nomad.zip -d /tmp
          sudo mv /tmp/nomad /usr/local/bin/nomad
          nomad version

      - name: Validate Nomad job spec
        run: |
          for f in nomad/*.hcl; do
            echo "Validating $f..."
            nomad job validate "$f"
          done

  lint:
    name: Lint Dockerfiles and YAML
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    concurrency:
      group: lint-dockerfiles-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Lint bases/Dockerfile.node
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: bases/Dockerfile.node
          config: .hadolint.yaml

      - name: Lint bases/Dockerfile.python
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: bases/Dockerfile.python
          config: .hadolint.yaml

      - name: Lint bases/Dockerfile.minimal
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: bases/Dockerfile.minimal
          config: .hadolint.yaml

      - name: Lint vessels/claude/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: vessels/claude/Dockerfile
          config: .hadolint.yaml

      - name: Lint vessels/codex/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: vessels/codex/Dockerfile
          config: .hadolint.yaml

      - name: Lint vessels/aider/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: vessels/aider/Dockerfile
          config: .hadolint.yaml

      - name: Lint vessels/goose/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: vessels/goose/Dockerfile
          config: .hadolint.yaml

      - name: Lint vessels/cline/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: vessels/cline/Dockerfile
          config: .hadolint.yaml

      - name: Lint vessels/opencode/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: vessels/opencode/Dockerfile
          config: .hadolint.yaml

      - name: Lint vessels/codebuff/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: vessels/codebuff/Dockerfile
          config: .hadolint.yaml

      - name: Lint vessels/ampcode/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: vessels/ampcode/Dockerfile
          config: .hadolint.yaml

      - name: Lint vessels/worker/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: vessels/worker/Dockerfile
          config: .hadolint.yaml

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: yamllint -c .yamllint.yml .github/workflows/ compose/

      - name: Cache pixi environment
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.0.2
        with:
          path: |
            .pixi
            ~/.cache/rattler/cache
          key: pixi-${{ runner.os }}-${{ hashFiles('pixi.lock') }}
          restore-keys: pixi-${{ runner.os }}-

      - name: Install pixi
        uses: prefix-dev/setup-pixi@2058dcd92f5dbe3befd7379ec6a3022bb746bdfd # v0.8.0
        with:
          cache: false

      - name: Install dependencies
        run: pixi install

      - name: Run pytest
        run: pixi run pytest

  validate-dagger:
    name: Validate Dagger Pipeline
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Cache dagger node_modules
        uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c  # v3.0.11
        with:
          path: dagger/node_modules
          key: ${{ runner.os }}-dagger-npm-${{ hashFiles('dagger/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-dagger-npm-

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.0.2
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: dagger
        run: npm ci

      - name: Audit npm dependencies
        working-directory: dagger
        run: npm audit --audit-level=high

  validate:
    name: Validate Compose Files
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Validate claude-only compose
        run: docker compose -f compose/docker-compose.claude-only.yml config --quiet

      - name: Validate mesh compose
        run: docker compose -f compose/docker-compose.mesh.yml config --quiet

      - name: Reject bare WORKSPACE_ROOT workspace mounts
        run: |
          if grep -rE '\$\{WORKSPACE_ROOT[^}]*\}:/workspace' compose/; then
            echo "ERROR: bare WORKSPACE_ROOT mount found — use a subdirectory like \${WORKSPACE_ROOT}/Agents/<Name>:/workspace"
            exit 1
          fi
          echo "No bare WORKSPACE_ROOT mounts found."


      - name: Assert AGENT_PORT consistency in compose files
        run: |
          python3 << 'SCRIPT'
          import yaml
          for f in ['compose/docker-compose.claude-only.yml', 'compose/docker-compose.mesh.yml']:
              data = yaml.safe_load(open(f))
              for name, svc in (data.get('services') or {}).items():
                  env = svc.get('environment', {})
                  port = None
                  if isinstance(env, dict):
                      port = env.get('AGENT_PORT')
                  elif isinstance(env, list):
                      for e in env:
                          if 'AGENT_PORT=' in str(e):
                              port = str(e).split('=', 1)[1]
                  if port:
                      ports = [str(p) for p in (svc.get('ports') or [])]
                      if not any(f':{port}' in p for p in ports):
                          print(f'WARNING: {name} AGENT_PORT={port} but no matching port mapping in {f}')
          print('AGENT_PORT check complete')
          SCRIPT

  build-bases:
    name: Build Base Images
    runs-on: ubuntu-24.04
    needs: [validate]
    strategy:
      matrix:
        base:
          - name: achaean-base-node
            dockerfile: bases/Dockerfile.node
          - name: achaean-base-python
            dockerfile: bases/Dockerfile.python
          - name: achaean-base-minimal
            dockerfile: bases/Dockerfile.minimal
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Remove stale base image tarballs
        shell: bash
        run: rm -f /tmp/achaean-base-*.tar

      - name: Verify base image digests are pinned
        run: |
          bad=$(grep -rn "^FROM" bases/ | grep -v "@sha256:" || true)
          if [[ -n "$bad" ]]; then
            echo "ERROR: Unpinned FROM lines found in bases/:"
            echo "$bad"
            exit 1
          fi
          echo "All base FROM lines are digest-pinned."

      - name: Set up Docker Buildx (docker driver — loads image into daemon directly)
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
        with:
          driver: docker

      - name: Set build metadata
        id: meta
        run: |
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "vcs_ref=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          version=$(git describe --tags --exact-match 2>/dev/null || echo "${GITHUB_SHA::7}")
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build base image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: ${{ matrix.base.dockerfile }}
          build-args: |
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            VCS_REF=${{ steps.meta.outputs.vcs_ref }}
            VERSION=${{ steps.meta.outputs.version }}
            IMAGE_VERSION=git-${{ github.sha }}
          push: false
          load: true
          tags: ${{ matrix.base.name }}:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Verify ENTRYPOINT is set
        run: |
          entrypoint=$(docker inspect "${{ matrix.base.name }}:latest" --format '{{json .Config.Entrypoint}}')
          if [[ "$entrypoint" == "null" || -z "$entrypoint" ]]; then
            echo "ERROR: ENTRYPOINT not set on ${{ matrix.base.name }}:latest"
            exit 1
          fi
          echo "ENTRYPOINT: $entrypoint"

      - name: Verify OCI labels are present
        run: |
          labels=$(docker inspect "${{ matrix.base.name }}:latest" --format '{{json .Config.Labels}}')
          if ! echo "$labels" | grep -q "org.opencontainers.image.created"; then
            echo "ERROR: OCI labels missing from ${{ matrix.base.name }}:latest"
            exit 1
          fi
          echo "OCI labels present: OK"

      - name: Assert no setuid binaries remain
        run: |
          setuid=$(docker run --rm --entrypoint sh "${{ matrix.base.name }}:latest" \
            -c "find / -xdev -perm /6000 -type f 2>/dev/null" || true)
          if [[ -n "$setuid" ]]; then
            echo "ERROR: setuid/setgid binaries found:"
            echo "$setuid"
            exit 1
          fi
          echo "No setuid/setgid binaries found: OK"

      - name: Scan base image for HIGH/CRITICAL CVEs
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ matrix.base.name }}:latest
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Smoke test base image setup
        run: |
          docker run --rm ${{ matrix.base.name }}:latest test -f /home/agent/.tmux.conf
          docker run --rm ${{ matrix.base.name }}:latest test -d /home/agent/.oh-my-zsh
          echo "Base image smoke tests passed."

      - name: Validate base image name is safe
        shell: bash
        run: |
          name="${{ matrix.base.name }}"
          if [[ ! "$name" =~ ^[a-z0-9-]+$ ]]; then
            echo "ERROR: unsafe base name: $name"
            exit 1
          fi

      - name: Export base image to tarball
        shell: bash
        run: |
          IMAGE_ID=$(docker image inspect --format '{{.Id}}' "${{ matrix.base.name }}:latest")
          docker save "${{ matrix.base.name }}:latest" -o /tmp/${{ matrix.base.name }}.tar

      - name: Verify tarball is non-empty
        shell: bash
        run: |
          [ -s /tmp/${{ matrix.base.name }}.tar ] || \
            { echo "ERROR: /tmp/${{ matrix.base.name }}.tar is empty or missing"; exit 1; }

      - name: Upload base image artifact
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b  # v4.5.0
        with:
          name: base-image-${{ matrix.base.name }}
          path: /tmp/${{ matrix.base.name }}.tar
          retention-days: 7

      - name: Clean up base image tarball
        if: always()
        shell: bash
        run: |
          df -h /tmp
          rm -f /tmp/${{ matrix.base.name }}.tar
          df -h /tmp

  build-vessels:
    name: Build Vessel Images
    runs-on: ubuntu-24.04
    needs: [build-bases]
    env:
      SHORT_SHA: ${{ github.sha }}
    strategy:
      matrix:
        vessel:
          - name: achaean-claude
            dockerfile: vessels/claude/Dockerfile
            base: achaean-base-node
          - name: achaean-codex
            dockerfile: vessels/codex/Dockerfile
            base: achaean-base-node
          - name: achaean-aider
            dockerfile: vessels/aider/Dockerfile
            base: achaean-base-python
          - name: achaean-goose
            dockerfile: vessels/goose/Dockerfile
            base: achaean-base-minimal
          - name: achaean-cline
            dockerfile: vessels/cline/Dockerfile
            base: achaean-base-node
          - name: achaean-opencode
            dockerfile: vessels/opencode/Dockerfile
            base: achaean-base-minimal
          - name: achaean-codebuff
            dockerfile: vessels/codebuff/Dockerfile
            base: achaean-base-node
          - name: achaean-ampcode
            dockerfile: vessels/ampcode/Dockerfile
            base: achaean-base-node
          - name: achaean-worker
            dockerfile: vessels/worker/Dockerfile
            base: achaean-base-minimal
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Download base image artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444306234a4d8376ee55d59d  # v4.1.8
        with:
          name: base-image-${{ matrix.vessel.base }}
          path: /tmp

      - name: Load base image into Docker daemon
        run: |
          IMAGE_ID=$(docker load -i /tmp/${{ matrix.vessel.base }}.tar | tail -1 | awk '{print $NF}')
          docker tag "$IMAGE_ID" "${{ matrix.vessel.base }}:latest"

      - name: Verify base image is available
        run: docker image inspect ${{ matrix.vessel.base }}:latest --format '{{.Id}}'

      - name: Set up Docker Buildx (docker driver — shares daemon image store)
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
        with:
          driver: docker

      - name: Set build metadata
        id: meta
        run: |
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "vcs_ref=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          version=$(git describe --tags --exact-match 2>/dev/null || echo "${GITHUB_SHA::7}")
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build vessel image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: ${{ matrix.vessel.dockerfile }}
          build-args: |
            BASE_IMAGE=${{ matrix.vessel.base }}:latest
            IMAGE_VERSION=git-${{ env.SHORT_SHA }}
          push: false
          load: true
          tags: ${{ matrix.vessel.name }}:latest
          labels: |
            org.opencontainers.image.revision=${{ env.SHORT_SHA }}

      - name: Verify ENTRYPOINT is set
        run: |
          entrypoint=$(docker inspect "${{ matrix.vessel.name }}:latest" --format '{{json .Config.Entrypoint}}')
          if [[ "$entrypoint" == "null" || -z "$entrypoint" ]]; then
            echo "ERROR: ENTRYPOINT not set on ${{ matrix.vessel.name }}:latest"
            exit 1
          fi
          echo "ENTRYPOINT: $entrypoint"

      - name: Trivy scan vessel image
        uses: aquasecurity/trivy-action@6c175e9e2f4b7ab73f4eba9148e7803dc5f640f6 # v0.35.0
        with:
          scan-type: image
          image-ref: ${{ matrix.vessel.name }}:latest
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: HIGH,CRITICAL

  test-smoke:
    name: Smoke Test Worker Vessel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Docker Buildx (docker driver — loads image into daemon directly)
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
        with:
          driver: docker

      - name: Build base-minimal
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: bases/Dockerfile.minimal
          push: false
          load: true
          tags: achaean-base-minimal:latest

      - name: Build worker vessel
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: vessels/worker/Dockerfile
          build-args: |
            BASE_IMAGE=achaean-base-minimal:latest
          push: false
          load: true
          tags: achaean-worker:latest

      - name: Start smoke container
        run: docker compose -f compose/docker-compose.smoke.yml up -d

      - name: Wait for /health on port 23080 (60s timeout)
        run: |
          ok=0
          for i in $(seq 1 30); do
            if wget -qO- http://localhost:23080/health 2>/dev/null | grep -q '"status"'; then
              echo "Health OK after $((i * 2))s"
              ok=1
              break
            fi
            sleep 2
          done
          [ $ok -eq 1 ] || { echo "FAIL: /health did not respond within 60s"; exit 1; }

      - name: Verify compose network connectivity
        run: |
          # Check that Docker internal DNS works for service names
          docker compose -f compose/docker-compose.smoke.yml exec -T hi-worker-smoke \
            sh -c "nslookup hi-worker-smoke 2>/dev/null || true" || true
          echo "Network smoke test: OK (DNS check — non-fatal)"

      - name: Tear down (always)
        if: always()
        run: docker compose -f compose/docker-compose.smoke.yml down --volumes --remove-orphans

      - name: Smoke test read-only root filesystem
        run: |
          timeout 30 docker run --rm \
            --read-only \
            --tmpfs /tmp \
            --tmpfs /run \
            --tmpfs /home/agent/.cache \
            --tmpfs /home/agent/.config \
            --tmpfs /home/agent/.local \
            --tmpfs /home/agent/.npm \
            -e AGENT_ID=worker-ro-test \
            -e AGENT_PORT=23001 \
            achaean-worker:latest \
            node /app/healthcheck-server.js &
          SERVER_PID=$!
          sleep 3
          if wget -qO- http://localhost:23001/health 2>/dev/null | grep -q '"status"'; then
            echo "Read-only root smoke test: OK (healthcheck responded)"
          else
            echo "WARNING: healthcheck endpoint not accessible, but container started with --read-only"
          fi
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
          echo "Read-only root smoke test: PASS"

  build-goose-multiarch:
    name: Build Goose Vessel (Multi-Arch)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.1.7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3.3.0

      - name: Build minimal base (amd64 + arm64)
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v5.4.0
        with:
          context: .
          file: bases/Dockerfile.minimal
          platforms: linux/amd64,linux/arm64
          push: false
          tags: achaean-base-minimal:latest
          outputs: type=oci,dest=/tmp/achaean-base-minimal.tar

      - name: Build goose vessel (amd64 + arm64)
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v5.4.0
        with:
          context: .
          file: vessels/goose/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            BASE_IMAGE=achaean-base-minimal:latest
          build-contexts: |
            achaean-base-minimal:latest=oci-layout:///tmp/achaean-base-minimal.tar
          push: false
          tags: achaean-goose:latest

      - name: Export vessel image to tarball
        run: docker save ${{ matrix.vessel.name }}:latest -o /tmp/${{ matrix.vessel.name }}.tar

      - name: Verify tarball is non-empty
        run: |
          [ -s /tmp/${{ matrix.vessel.name }}.tar ] || \
            { echo "ERROR: /tmp/${{ matrix.vessel.name }}.tar is empty or missing"; exit 1; }

      - name: Upload vessel image artifact
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b  # v4.5.0
        with:
          name: vessel-image-${{ matrix.vessel.name }}
          path: /tmp/${{ matrix.vessel.name }}.tar
          retention-days: 7

      - name: Clean up downloaded base image tarball
        if: always()
        run: rm -f /tmp/${{ matrix.vessel.base }}.tar

  push-to-registry:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: [build-vessels]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      packages: write
      contents: read
    env:
      REGISTRY: ghcr.io/homericintelligence
      SHORT_SHA: ${{ github.sha }}
    outputs:
      sha_tag: ${{ steps.tags.outputs.sha_tag }}
      date_tag: ${{ steps.tags.outputs.date_tag }}
    strategy:
      matrix:
        vessel:
          - name: achaean-claude
            dockerfile: vessels/claude/Dockerfile
            base: achaean-base-node
          - name: achaean-codex
            dockerfile: vessels/codex/Dockerfile
            base: achaean-base-node
          - name: achaean-aider
            dockerfile: vessels/aider/Dockerfile
            base: achaean-base-python
          - name: achaean-goose
            dockerfile: vessels/goose/Dockerfile
            base: achaean-base-minimal
          - name: achaean-cline
            dockerfile: vessels/cline/Dockerfile
            base: achaean-base-node
          - name: achaean-opencode
            dockerfile: vessels/opencode/Dockerfile
            base: achaean-base-minimal
          - name: achaean-codebuff
            dockerfile: vessels/codebuff/Dockerfile
            base: achaean-base-node
          - name: achaean-ampcode
            dockerfile: vessels/ampcode/Dockerfile
            base: achaean-base-node
          - name: achaean-worker
            dockerfile: vessels/worker/Dockerfile
            base: achaean-base-minimal
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Log in to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download base image artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444306234a4d8376ee55d59d  # v4.1.8
        with:
          name: base-image-${{ matrix.vessel.base }}
          path: /tmp

      - name: Load base image into Docker daemon
        run: docker load -i /tmp/${{ matrix.vessel.base }}.tar

      - name: Verify vessel artifact is non-empty
        shell: bash
        run: |
          if [ ! -s /tmp/${{ matrix.vessel.base }}.tar ]; then
            echo "ERROR: base image tarball missing or empty"; exit 1
          fi

      - name: Set up Docker Buildx (docker driver — shares daemon image store)
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
        with:
          driver: docker

      - name: Compute image tags
        id: tags
        run: |
          echo "sha_tag=git-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "date_tag=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbea8a10b75fc6e8e4f4f09f7e4e  # v5.7.0
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.vessel.name }}
          tags: |
            type=sha,prefix=git-,format=short
            type=raw,value={{date 'YYYY-MM-DD'}}
            type=raw,value=latest

      - name: Build and push vessel image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: ${{ matrix.vessel.dockerfile }}
          build-args: |
            BASE_IMAGE=${{ matrix.vessel.base }}:latest
            IMAGE_VERSION=git-${{ env.SHORT_SHA }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Record image digest
        id: digest
        shell: bash
        env:
          VESSEL_NAME: ${{ matrix.vessel.name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          IMAGE_NAME=$(echo "$VESSEL_NAME" | tr '[:upper:]' '[:lower:]')
          DIGEST=$(docker inspect --format '{{.Id}}' "${IMAGE_NAME}:latest")
          if [[ -z "$DIGEST" ]]; then
            echo "ERROR: docker inspect returned empty digest for ${IMAGE_NAME}:latest" >&2
            exit 1
          fi
          if [[ ! "$DIGEST" =~ ^sha256:[a-f0-9]{64}$ ]]; then
            echo "ERROR: digest format invalid: ${DIGEST}" >&2
            exit 1
          fi
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "## Image Digest: \`${IMAGE_NAME}:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${IMAGE_NAME}:latest\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Digest | \`${DIGEST}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${COMMIT_SHA}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "::notice title=Image Digest::${IMAGE_NAME}:latest -> ${DIGEST}"

  verify-registry:
    name: Verify GHCR Tags
    runs-on: ubuntu-latest
    needs: push-to-registry
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 10
    permissions:
      packages: read
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Log in to GHCR (read-only)
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify registry tags
        env:
          REGISTRY: ghcr.io/homericintelligence
          SHA_TAG: ${{ needs.push-to-registry.outputs.sha_tag }}
          DATE_TAG: ${{ needs.push-to-registry.outputs.date_tag }}
        run: |
          set -euo pipefail

          # Initialize summary table
          echo "## Registry Tag Verification" >> "$GITHUB_STEP_SUMMARY"
          echo "| Vessel | Tag | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- | --- |" >> "$GITHUB_STEP_SUMMARY"

          vessels=(
            "achaean-claude"
            "achaean-codex"
            "achaean-aider"
            "achaean-goose"
            "achaean-cline"
            "achaean-opencode"
            "achaean-codebuff"
            "achaean-ampcode"
            "achaean-worker"
          )

          failed=0
          for vessel in "${vessels[@]}"; do
            for tag in "latest" "${SHA_TAG}" "${DATE_TAG}"; do
              image="${REGISTRY}/${vessel}:${tag}"
              if docker manifest inspect "$image" >/dev/null 2>&1; then
                echo "| $vessel | $tag | ✅ verified |" >> "$GITHUB_STEP_SUMMARY"
              else
                echo "| $vessel | $tag | ❌ failed |" >> "$GITHUB_STEP_SUMMARY"
                failed=1
              fi
            done
          done

          if [[ $failed -eq 1 ]]; then
            echo "ERROR: One or more tag verifications failed" >&2
            exit 1
          fi
          echo "All vessel tags verified successfully."
