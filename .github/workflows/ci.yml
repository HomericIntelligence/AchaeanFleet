name: Build All Agent Images

on:
  push:
    branches: [main]
    paths:
      - 'bases/**'
      - 'vessels/**'
      - 'dagger/**'
      - 'compose/**'
      - 'tests/**'
      - '.github/workflows/**'
      - 'nomad/**'
  pull_request:
    branches: [main]
    paths:
      - 'bases/**'
      - 'vessels/**'
      - 'dagger/**'
      - 'compose/**'
      - 'tests/**'
      - '.github/workflows/**'
      - 'nomad/**'
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 06:00 UTC — digest freshness check

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-nomad:
    name: Validate Nomad Job HCL
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Nomad
        env:
          NOMAD_VERSION: "1.9.7"
        run: |
          curl -fsSL "https://releases.hashicorp.com/nomad/${NOMAD_VERSION}/nomad_${NOMAD_VERSION}_linux_amd64.zip" \
            -o /tmp/nomad.zip
          unzip -q /tmp/nomad.zip -d /tmp
          sudo mv /tmp/nomad /usr/local/bin/nomad
          nomad version

      - name: Validate Nomad job spec
        run: nomad job validate nomad/mesh.nomad.hcl

  lint:
    name: Lint Dockerfiles and YAML
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    concurrency:
      group: lint-dockerfiles-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6

      - name: Lint bases/Dockerfile.node
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: bases/Dockerfile.node
          config: .hadolint.yaml

      - name: Lint bases/Dockerfile.python
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: bases/Dockerfile.python
          config: .hadolint.yaml

      - name: Lint bases/Dockerfile.minimal
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: bases/Dockerfile.minimal
          config: .hadolint.yaml

      - name: Lint vessels/claude/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: vessels/claude/Dockerfile
          config: .hadolint.yaml

      - name: Lint vessels/codex/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: vessels/codex/Dockerfile
          config: .hadolint.yaml

      - name: Lint vessels/aider/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: vessels/aider/Dockerfile
          config: .hadolint.yaml

      - name: Lint vessels/goose/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: vessels/goose/Dockerfile
          config: .hadolint.yaml

      - name: Lint vessels/cline/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: vessels/cline/Dockerfile
          config: .hadolint.yaml

      - name: Lint vessels/opencode/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: vessels/opencode/Dockerfile
          config: .hadolint.yaml

      - name: Lint vessels/codebuff/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: vessels/codebuff/Dockerfile
          config: .hadolint.yaml

      - name: Lint vessels/ampcode/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: vessels/ampcode/Dockerfile
          config: .hadolint.yaml

      - name: Lint vessels/worker/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: vessels/worker/Dockerfile
          config: .hadolint.yaml

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: yamllint -c .yamllint.yml .github/workflows/ compose/

  validate:
    name: Validate Compose Files
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v6

      - name: Validate claude-only compose
        run: docker compose -f compose/docker-compose.claude-only.yml config --quiet

      - name: Validate mesh compose
        run: docker compose -f compose/docker-compose.mesh.yml config --quiet

  build-bases:
    name: Build Base Images
    runs-on: ubuntu-latest
    needs: [validate]
    strategy:
      matrix:
        base:
          - name: achaean-base-node
            dockerfile: bases/Dockerfile.node
          - name: achaean-base-python
            dockerfile: bases/Dockerfile.python
          - name: achaean-base-minimal
            dockerfile: bases/Dockerfile.minimal
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Verify base image digests are pinned
        run: |
          bad=$(grep -rn "^FROM" bases/ | grep -v "@sha256:" || true)
          if [[ -n "$bad" ]]; then
            echo "ERROR: Unpinned FROM lines found in bases/:"
            echo "$bad"
            exit 1
          fi
          echo "All base FROM lines are digest-pinned."

      - name: Set up Docker Buildx (docker driver — loads image into daemon directly)
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
        with:
          driver: docker

      - name: Set build metadata
        id: meta
        run: |
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "vcs_ref=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build base image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: ${{ matrix.base.dockerfile }}
          build-args: |
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            VCS_REF=${{ steps.meta.outputs.vcs_ref }}
            VERSION=${{ steps.meta.outputs.version }}
            IMAGE_VERSION=git-${{ github.sha }}
          push: false
          load: true
          tags: ${{ matrix.base.name }}:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Export base image to tarball
        run: docker save ${{ matrix.base.name }}:latest -o /tmp/${{ matrix.base.name }}.tar

      - name: Upload base image artifact
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b  # v4.5.0
        with:
          name: base-image-${{ matrix.base.name }}
          path: /tmp/${{ matrix.base.name }}.tar
          retention-days: 1

  build-vessels:
    name: Build Vessel Images
    runs-on: ubuntu-latest
    needs: [build-bases]
    env:
      SHORT_SHA: ${{ github.sha }}
    strategy:
      matrix:
        vessel:
          - name: achaean-claude
            dockerfile: vessels/claude/Dockerfile
            base: achaean-base-node
          - name: achaean-codex
            dockerfile: vessels/codex/Dockerfile
            base: achaean-base-node
          - name: achaean-aider
            dockerfile: vessels/aider/Dockerfile
            base: achaean-base-python
          - name: achaean-goose
            dockerfile: vessels/goose/Dockerfile
            base: achaean-base-minimal
          - name: achaean-cline
            dockerfile: vessels/cline/Dockerfile
            base: achaean-base-node
          - name: achaean-opencode
            dockerfile: vessels/opencode/Dockerfile
            base: achaean-base-minimal
          - name: achaean-codebuff
            dockerfile: vessels/codebuff/Dockerfile
            base: achaean-base-node
          - name: achaean-ampcode
            dockerfile: vessels/ampcode/Dockerfile
            base: achaean-base-node
          - name: achaean-worker
            dockerfile: vessels/worker/Dockerfile
            base: achaean-base-minimal
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Download base image artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444306234a4d8376ee55d59d  # v4.1.8
        with:
          name: base-image-${{ matrix.vessel.base }}
          path: /tmp

      - name: Load base image into Docker daemon
        run: docker load -i /tmp/${{ matrix.vessel.base }}.tar

      - name: Set up Docker Buildx (docker driver — shares daemon image store)
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
        with:
          driver: docker

      - name: Set build metadata
        id: meta
        run: |
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "vcs_ref=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build vessel image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: ${{ matrix.vessel.dockerfile }}
          build-args: |
            BASE_IMAGE=${{ matrix.vessel.base }}:latest
            IMAGE_VERSION=git-${{ env.SHORT_SHA }}
          push: false
          tags: ${{ matrix.vessel.name }}:latest
          labels: |
            org.opencontainers.image.revision=${{ env.SHORT_SHA }}

  test-smoke:
    name: Smoke Test Worker Vessel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx (docker driver — loads image into daemon directly)
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker

      - name: Build base-minimal
        uses: docker/build-push-action@v7
        with:
          context: .
          file: bases/Dockerfile.minimal
          push: false
          load: true
          tags: achaean-base-minimal:latest

      - name: Build worker vessel
        uses: docker/build-push-action@v7
        with:
          context: .
          file: vessels/worker/Dockerfile
          build-args: |
            BASE_IMAGE=achaean-base-minimal:latest
          push: false
          load: true
          tags: achaean-worker:latest

      - name: Start smoke container
        run: docker compose -f compose/docker-compose.smoke.yml up -d

      - name: Wait for /health on port 23080 (60s timeout)
        run: |
          ok=0
          for i in $(seq 1 30); do
            if wget -qO- http://localhost:23080/health 2>/dev/null | grep -q '"status"'; then
              echo "Health OK after $((i * 2))s"
              ok=1
              break
            fi
            sleep 2
          done
          [ $ok -eq 1 ] || { echo "FAIL: /health did not respond within 60s"; exit 1; }

      - name: Tear down (always)
        if: always()
        run: docker compose -f compose/docker-compose.smoke.yml down --volumes --remove-orphans


  build-goose-multiarch:
    name: Build Goose Vessel (Multi-Arch)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build minimal base (amd64 + arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: bases/Dockerfile.minimal
          platforms: linux/amd64,linux/arm64
          push: false
          tags: achaean-base-minimal:latest
          outputs: type=oci,dest=/tmp/achaean-base-minimal.tar

      - name: Build goose vessel (amd64 + arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: vessels/goose/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            BASE_IMAGE=achaean-base-minimal:latest
          build-contexts: |
            achaean-base-minimal:latest=oci-layout:///tmp/achaean-base-minimal.tar
          push: false
          tags: achaean-goose:latest

  push-to-registry:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: [build-vessels]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      packages: write
      contents: read
    env:
      REGISTRY: ghcr.io/homericintelligence
      SHORT_SHA: ${{ github.sha }}
    strategy:
      matrix:
        vessel:
          - name: achaean-claude
            dockerfile: vessels/claude/Dockerfile
            base: achaean-base-node
          - name: achaean-codex
            dockerfile: vessels/codex/Dockerfile
            base: achaean-base-node
          - name: achaean-aider
            dockerfile: vessels/aider/Dockerfile
            base: achaean-base-python
          - name: achaean-goose
            dockerfile: vessels/goose/Dockerfile
            base: achaean-base-minimal
          - name: achaean-cline
            dockerfile: vessels/cline/Dockerfile
            base: achaean-base-node
          - name: achaean-opencode
            dockerfile: vessels/opencode/Dockerfile
            base: achaean-base-minimal
          - name: achaean-codebuff
            dockerfile: vessels/codebuff/Dockerfile
            base: achaean-base-node
          - name: achaean-ampcode
            dockerfile: vessels/ampcode/Dockerfile
            base: achaean-base-node
          - name: achaean-worker
            dockerfile: vessels/worker/Dockerfile
            base: achaean-base-minimal
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Log in to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download base image artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444306234a4d8376ee55d59d  # v4.1.8
        with:
          name: base-image-${{ matrix.vessel.base }}
          path: /tmp

      - name: Load base image into Docker daemon
        run: docker load -i /tmp/${{ matrix.vessel.base }}.tar

      - name: Set up Docker Buildx (docker driver — shares daemon image store)
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
        with:
          driver: docker

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbea8a10b75fc6e8e4f4f09f7e4e  # v5.7.0
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.vessel.name }}
          tags: |
            type=sha,prefix=git-,format=short
            type=raw,value={{date 'YYYY-MM-DD'}}
            type=raw,value=latest

      - name: Build and push vessel image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: ${{ matrix.vessel.dockerfile }}
          build-args: |
            BASE_IMAGE=${{ matrix.vessel.base }}:latest
            IMAGE_VERSION=git-${{ env.SHORT_SHA }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Record image digest
        id: digest
        shell: bash
        env:
          VESSEL_NAME: ${{ matrix.vessel.name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          IMAGE_NAME=$(echo "$VESSEL_NAME" | tr '[:upper:]' '[:lower:]')
          DIGEST=$(docker inspect --format '{{.Id}}' "${IMAGE_NAME}:latest")
          if [[ -z "$DIGEST" ]]; then
            echo "ERROR: docker inspect returned empty digest for ${IMAGE_NAME}:latest" >&2
            exit 1
          fi
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "## Image Digest: \`${IMAGE_NAME}:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${IMAGE_NAME}:latest\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Digest | \`${DIGEST}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${COMMIT_SHA}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "::notice title=Image Digest::${IMAGE_NAME}:latest -> ${DIGEST}"
