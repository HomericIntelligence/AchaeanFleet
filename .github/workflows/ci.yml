name: Build All Agent Images

on:
  push:
    branches: [main]
    paths:
      - 'bases/**'
      - 'vessels/**'
      - 'dagger/**'
      - 'compose/**'
  pull_request:
    branches: [main]
    paths:
      - 'bases/**'
      - 'vessels/**'
      - 'dagger/**'
      - 'compose/**'

jobs:
  build-bases:
    name: Build Base Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        base:
          - name: achaean-base-node
            dockerfile: bases/Dockerfile.node
          - name: achaean-base-python
            dockerfile: bases/Dockerfile.python
          - name: achaean-base-minimal
            dockerfile: bases/Dockerfile.minimal
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx (docker driver — loads image into daemon directly)
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Build base image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.base.dockerfile }}
          push: false
          load: true
          tags: ${{ matrix.base.name }}:latest

      - name: Export base image to tarball
        run: docker save ${{ matrix.base.name }}:latest -o /tmp/${{ matrix.base.name }}.tar

      - name: Upload base image artifact
        uses: actions/upload-artifact@v4
        with:
          name: base-image-${{ matrix.base.name }}
          path: /tmp/${{ matrix.base.name }}.tar
          retention-days: 1

  build-vessels:
    name: Build Vessel Images
    runs-on: ubuntu-latest
    needs: build-bases
    strategy:
      matrix:
        vessel:
          - name: achaean-claude
            dockerfile: vessels/claude/Dockerfile
            base: achaean-base-node
          - name: achaean-codex
            dockerfile: vessels/codex/Dockerfile
            base: achaean-base-node
          - name: achaean-aider
            dockerfile: vessels/aider/Dockerfile
            base: achaean-base-python
          - name: achaean-goose
            dockerfile: vessels/goose/Dockerfile
            base: achaean-base-minimal
          - name: achaean-cline
            dockerfile: vessels/cline/Dockerfile
            base: achaean-base-node
          - name: achaean-opencode
            dockerfile: vessels/opencode/Dockerfile
            base: achaean-base-minimal
          - name: achaean-codebuff
            dockerfile: vessels/codebuff/Dockerfile
            base: achaean-base-node
          - name: achaean-ampcode
            dockerfile: vessels/ampcode/Dockerfile
            base: achaean-base-node
          - name: achaean-worker
            dockerfile: vessels/worker/Dockerfile
            base: achaean-base-minimal
    steps:
      - uses: actions/checkout@v4

      - name: Download base image artifact
        uses: actions/download-artifact@v4
        with:
          name: base-image-${{ matrix.vessel.base }}
          path: /tmp

      - name: Load base image into Docker daemon
        run: docker load -i /tmp/${{ matrix.vessel.base }}.tar

      - name: Set up Docker Buildx (docker driver — shares daemon image store)
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Build vessel image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.vessel.dockerfile }}
          build-args: |
            BASE_IMAGE=${{ matrix.vessel.base }}:latest
          push: false
          tags: ${{ matrix.vessel.name }}:latest

  test-compose:
    name: Validate Compose Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate claude-only compose
        run: docker compose -f compose/docker-compose.claude-only.yml config --quiet

      - name: Validate mesh compose
        run: docker compose -f compose/docker-compose.mesh.yml config --quiet

      - name: Validate smoke compose
        run: docker compose -f compose/docker-compose.smoke.yml config --quiet

  test-smoke:
    name: Smoke Test Worker Vessel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx (docker driver — loads image into daemon directly)
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Build base-minimal
        uses: docker/build-push-action@v5
        with:
          context: .
          file: bases/Dockerfile.minimal
          push: false
          load: true
          tags: achaean-base-minimal:latest

      - name: Build worker vessel
        uses: docker/build-push-action@v5
        with:
          context: .
          file: vessels/worker/Dockerfile
          build-args: |
            BASE_IMAGE=achaean-base-minimal:latest
          push: false
          load: true
          tags: achaean-worker:latest

      - name: Start smoke container
        run: docker compose -f compose/docker-compose.smoke.yml up -d

      - name: Wait for /health on port 23080 (60s timeout)
        run: |
          ok=0
          for i in $(seq 1 30); do
            if wget -qO- http://localhost:23080/health 2>/dev/null | grep -q '"status"'; then
              echo "Health OK after $((i * 2))s"
              ok=1
              break
            fi
            sleep 2
          done
          [ $ok -eq 1 ] || { echo "FAIL: /health did not respond within 60s"; exit 1; }

      - name: Tear down (always)
        if: always()
        run: docker compose -f compose/docker-compose.smoke.yml down --volumes --remove-orphans

  push-to-registry:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: build-vessels
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      packages: write
      contents: read
    env:
      REGISTRY: ghcr.io/homericintelligence
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Dagger SDK
        run: npm install @dagger.io/dagger

      - name: Build and push all images via Dagger
        env:
          DAGGER_REGISTRY: ghcr.io/homericintelligence
        run: npx ts-node dagger/pipeline.ts push --registry "$DAGGER_REGISTRY"
