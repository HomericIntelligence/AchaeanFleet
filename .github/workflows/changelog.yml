name: Update CHANGELOG

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with full history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.1.7
        with:
          fetch-depth: 0

      - name: Install git-cliff
        run: pip install git-cliff

      - name: Generate CHANGELOG
        run: git cliff --output CHANGELOG.md

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet CHANGELOG.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR for CHANGELOG update
        if: steps.check_changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/changelog-$(date -u +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add CHANGELOG.md
          git commit -m "docs: update CHANGELOG.md [skip ci]"
          git push -u origin "$BRANCH"
          PR_URL=$(gh pr create \
            --title "docs: update CHANGELOG.md" \
            --body "Automated CHANGELOG update generated by git-cliff." \
            --base main \
            --head "$BRANCH")
          echo "PR: $PR_URL"
          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          gh pr merge "$PR_NUMBER" --auto --rebase
