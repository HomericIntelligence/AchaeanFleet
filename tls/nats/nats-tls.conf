# nats-tls.conf — NATS server TLS configuration template
#
# This is a forward-looking template for when Hermes/Keystone are integrated
# into the homeric-mesh. NATS must be deployed with TLS from the start.
#
# Usage:
#   nats-server -c tls/nats/nats-tls.conf
#
# Prerequisites:
#   Run:  bash tls/generate-certs.sh
#   Certs are expected at tls/certs/{ca.crt,nats.crt,nats.key}
#
# Client connection string:
#   NATS_URL=tls://nats:4222
#
# Client must supply --tlscacert tls/certs/ca.crt  (or set NATS_CA env var)

# Server identity
server_name: "homeric-nats"

# Standard NATS client port (TLS-only — no plain nats:// fallback)
port: 4222

# HTTP monitoring (internal, no TLS needed for metrics scraping on loopback)
http_port: 8222

# TLS configuration
tls {
  cert_file: "/certs/nats.crt"
  key_file:  "/certs/nats.key"
  ca_file:   "/certs/ca.crt"

  # Require clients to present a valid certificate (mTLS)
  # Set to false if agent clients don't yet have client certs
  verify: false

  # Minimum TLS version
  min_version: "1.2"
}

# Cluster-level TLS (for multi-node NATS clusters — placeholder)
# cluster {
#   name: "homeric-nats-cluster"
#   tls {
#     cert_file: "/certs/nats.crt"
#     key_file:  "/certs/nats.key"
#     ca_file:   "/certs/ca.crt"
#     verify:    true
#   }
# }

# Logging
logtime: true
debug: false
trace: false
