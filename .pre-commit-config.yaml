---
# AchaeanFleet pre-commit configuration
# Install: pre-commit install  (or: just lint-install)
# Run manually: pre-commit run --all-files  (or: just lint)
# Update hook revisions: pre-commit autoupdate

repos:
  # ---------------------------------------------------------------------------
  # Standard file hygiene
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]  # allow YAML anchors (used in Docker Compose)
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]

  # ---------------------------------------------------------------------------
  # YAML linting (with project-specific overrides in .yamllint.yml)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [--config-file, .yamllint.yml]

  # ---------------------------------------------------------------------------
  # Dockerfile linting (hadolint)
  # Waived rules (intentional patterns in this repo):
  #   DL3008: apt-get without --no-install-recommends — base images include dev tools intentionally
  #   DL3015: same as DL3008
  #   DL3013: pip without version pin — agent tool versions track latest by design
  #   DL3016: npm without version pin — same as DL3013
  #   DL3042: pip cache dir — handled by --no-cache-dir in vessel Dockerfiles
  #   DL3046: useradd without -l — UID 1000 is standard, image size impact is acceptable
  #   DL3059: Multiple consecutive RUN — intentional grouping in base images
  #   DL4006: SHELL pipefail — piped RUN commands in base/vessel images are intentional
  # ---------------------------------------------------------------------------
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint
        args:
          - --ignore=DL3008
          - --ignore=DL3013
          - --ignore=DL3015
          - --ignore=DL3016
          - --ignore=DL3042
          - --ignore=DL3046
          - --ignore=DL3059
          - --ignore=DL4006

  # ---------------------------------------------------------------------------
  # Shell script linting (shellcheck)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [--severity=warning]

  # ---------------------------------------------------------------------------
  # Local hooks
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      # Catch curl-pipe-bash patterns in Dockerfiles before hadolint runs.
      # Existing intentional uses:
      #   bases/Dockerfile.python, bases/Dockerfile.minimal — nodesource setup
      #   bases/Dockerfile.node, bases/Dockerfile.python, bases/Dockerfile.minimal — Oh My Zsh install
      #   vessels/goose, vessels/opencode — official binary install scripts
      # If you add a new curl-pipe-bash, document why with a comment above it.
      - id: no-new-curl-pipe-bash
        name: Warn on new curl-pipe-bash patterns
        language: pygrep
        entry: 'curl.*\|\s*(bash|sh)'
        files: 'Dockerfile'
        types: [file]
        exclude: 'bases/Dockerfile\.(node|python|minimal)|vessels/(goose|opencode)/Dockerfile'

      # Detect stale npm lockfile in dagger/
      # Fails if package.json is staged but package-lock.json is not, or if dry-run fails
      - id: detect-stale-npm-lock
        name: Detect stale npm lockfile
        entry: bash -c 'cd dagger && npm ci --dry-run'
        language: system
        files: 'dagger/package\.json'
        pass_filenames: false

      # Detect stale pixi lockfile at root
      # Fails if pixi.toml is staged but pixi.lock is not, or if locked install fails
      - id: detect-stale-pixi-lock
        name: Detect stale pixi lockfile
        entry: pixi install --locked
        language: system
        files: 'pixi\.toml'
        pass_filenames: false

      # ---------------------------------------------------------------------
      # No silent-failure workarounds — see HomericIntelligence/Odysseus#280
      # ---------------------------------------------------------------------
      - id: forbid-or-true
        name: "forbid silent-failure workaround in shell/YAML/Dockerfile/justfile/HCL"
        description: >
          Rejects the `or-true` idiom (and its whitespace variants) in shell,
          YAML, Dockerfile, justfile, and HCL sources. Refactor to an explicit
          `if`-guard, a real conditional, or a documented `set +e`/`set -e`
          bracket. See HomericIntelligence/Odysseus#280.
        language: pygrep
        entry: '\|\|\s*true(\s*$|\s+#)'
        files: \.(sh|bash|yml|yaml|hcl)$|(^|/)Dockerfile[^/]*$|(^|/)[Jj]ustfile$
        types: [text]
        pass_filenames: true

      - id: forbid-continue-on-error
        name: "forbid continue-on-error workflow opt-out"
        description: >
          GitHub Actions `continue-on-error true` (truthy form) hides real CI
          failures. Fix the underlying job/step instead.
        language: pygrep
        entry: '^\s*continue-on-error:\s*true\s*$'
        files: ^\.github/workflows/.*\.ya?ml$
        pass_filenames: true

      - id: forbid-advisory-warnings
        name: "forbid advisory ::warning:: pattern in workflow run blocks"
        description: >
          The advisory-warning workflow annotation is morally equivalent to
          `continue-on-error: true` when it replaces a tool's failure exit
          with a benign-looking warning. The CI step still passes, the
          underlying problem still goes unfixed. Make the step fail-fast
          instead. The only legitimate use is annotating a step that runs
          BEFORE the failing tool (e.g., advising on a deprecated config),
          not wrapping the tool's own exit. See docs/runbooks/no-silent-failures.md.
        language: pygrep
        # Match the GitHub Actions advisory-annotation prefix. We exempt
        # this workflow file (the lint rule itself contains the literal
        # for self-documentation) via the `exclude` regex below.
        entry: '::warning::'
        files: ^\.github/workflows/.*\.ya?ml$
        exclude: ^\.github/workflows/_required\.yml$
        pass_filenames: true
