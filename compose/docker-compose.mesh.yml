# AchaeanFleet: Full Heterogeneous Mesh Compose
#
# Starts a mixed fleet of all 9 agent types.
# This is the Phase 4 verification target.
#
# Usage:
#   cp .env.example .env && nano .env
#   docker compose -f docker-compose.mesh.yml up -d
#
# Check health: docker compose -f docker-compose.mesh.yml ps

version: "3.9"

networks:
  homeric-mesh:
    name: ${MESH_NETWORK:-homeric-mesh}
    driver: bridge

# Shared environment for all agents
x-common-env: &common-env
  AGAMEMNON_URL: ${AGAMEMNON_URL:-http://172.20.0.1:8080}

# Shared healthcheck
x-healthcheck: &healthcheck
  test: ["CMD", "curl", "-f", "http://localhost:23001/health"]
  interval: 30s
  timeout: 5s
  start_period: 15s
  retries: 3

services:
  # -------------------------------------------------------------------------
  # Claude agents (Node base)
  # -------------------------------------------------------------------------
  hi-aindrea:
    image: ${CLAUDE_IMAGE:-achaean-claude:latest}
    container_name: hi-aindrea
    hostname: hi-aindrea
    networks: [homeric-mesh]
    ports: ["23001:23001"]
    environment:
      <<: *common-env
      AGENT_ID: aindrea
      AGENT_PORT: "23001"
      TMUX_SESSION_NAME: aindrea
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - ${WORKSPACE_ROOT:-/home/mvillmow}/Agents/Aindrea:/workspace
    working_dir: /workspace
    restart: unless-stopped
    healthcheck: *healthcheck

  hi-baird:
    image: ${CLAUDE_IMAGE:-achaean-claude:latest}
    container_name: hi-baird
    hostname: hi-baird
    networks: [homeric-mesh]
    ports: ["23003:23001"]
    environment:
      <<: *common-env
      AGENT_ID: baird
      AGENT_PORT: "23001"
      TMUX_SESSION_NAME: baird
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - ${WORKSPACE_ROOT:-/home/mvillmow}/ProjectScylla:/workspace
    working_dir: /workspace
    restart: unless-stopped
    healthcheck: *healthcheck

  # -------------------------------------------------------------------------
  # Codex agent (Node base)
  # -------------------------------------------------------------------------
  hi-codex-1:
    image: ${CODEX_IMAGE:-achaean-codex:latest}
    container_name: hi-codex-1
    hostname: hi-codex-1
    networks: [homeric-mesh]
    ports: ["23010:23001"]
    environment:
      <<: *common-env
      AGENT_ID: codex-1
      AGENT_PORT: "23001"
      TMUX_SESSION_NAME: codex-1
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - ${WORKSPACE_ROOT:-/home/mvillmow}:/workspace
    working_dir: /workspace
    restart: unless-stopped
    healthcheck: *healthcheck

  # -------------------------------------------------------------------------
  # Aider agent (Python base)
  # -------------------------------------------------------------------------
  hi-aider-1:
    image: ${AIDER_IMAGE:-achaean-aider:latest}
    container_name: hi-aider-1
    hostname: hi-aider-1
    networks: [homeric-mesh]
    ports: ["23020:23001"]
    environment:
      <<: *common-env
      AGENT_ID: aider-1
      AGENT_PORT: "23001"
      TMUX_SESSION_NAME: aider-1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      AIDER_MODEL: ${AIDER_MODEL:-claude-3-5-sonnet-20241022}
    volumes:
      - ${WORKSPACE_ROOT:-/home/mvillmow}:/workspace
    working_dir: /workspace
    restart: unless-stopped
    healthcheck: *healthcheck

  # -------------------------------------------------------------------------
  # Goose agent (minimal/binary base)
  # -------------------------------------------------------------------------
  hi-goose-1:
    image: ${GOOSE_IMAGE:-achaean-goose:latest}
