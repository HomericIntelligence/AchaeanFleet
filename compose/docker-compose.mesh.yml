# AchaeanFleet: Full Heterogeneous Mesh Compose
#
# Starts a mixed fleet of all 9 agent types.
# This is the Phase 4 verification target.
#
# Usage:
#   cp .env.example .env && nano .env  (add API keys)
#   bash ../tls/generate-certs.sh      (generate TLS certs, first time only)
#   docker compose \
#     -f docker-compose.caddy.yml \
#     -f docker-compose.mesh.yml \
#     up -d
#
# To pin all images to a specific version, set IMAGE_TAG in .env:
#   IMAGE_TAG=v1.0.0    (semver release — reproducible)
#   IMAGE_TAG=abc1234   (7-char git SHA from CI — traceable)
#   IMAGE_TAG=latest    (default — always the newest build, not pinned)
#
# Check health: docker compose -f docker-compose.mesh.yml ps
#
# API key secrets:
#   mkdir -p secrets
#   echo -n "sk-ant-..." > secrets/anthropic_api_key && chmod 600 secrets/anthropic_api_key
#   echo -n "sk-..."     > secrets/openai_api_key    && chmod 600 secrets/openai_api_key
#   (set SECRETS_DIR in .env if your secrets dir lives elsewhere)

version: "3.9"

networks:
  agamemnon-frontend:
    driver: bridge
  agent-backend:
    driver: bridge

secrets:
  anthropic_api_key:
    file: ${SECRETS_DIR:-./secrets}/anthropic_api_key
  openai_api_key:
    file: ${SECRETS_DIR:-./secrets}/openai_api_key

# Shared security hardening applied to all services
x-security: &security
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

# Shared environment for all agents
x-common-env: &common-env
  AGAMEMNON_URL: ${AGAMEMNON_URL:-https://caddy:8443}
  TLS_CA_CERT: ${TLS_CA_CERT:-/certs/ca.crt}

# Shared logging
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "${LOG_MAX_SIZE:-10m}"
    max-file: "${LOG_MAX_FILES:-3}"

# Shared healthcheck
x-healthcheck: &healthcheck
  test: ["CMD", "curl", "-f", "--cacert", "/certs/ca.crt", "https://caddy:8443/health"]
  interval: 30s
  timeout: 5s
  start_period: 15s
  retries: 3

# Shared tmpfs mounts for paths that need write access under read-only root.
# /tmp        - general temp files and tmux sockets (/tmp/tmux-*)
# /run        - runtime PID files and sockets
# /home/agent/.cache  - tool caches (npm, Claude Code, pip, etc.)
# /home/agent/.config - runtime config writes
# /home/agent/.local  - Python user installs and local state
x-tmpfs: &tmpfs
  - /tmp
  - /run
  - /home/agent/.cache
  - /home/agent/.config
  - /home/agent/.local

services:
  # -------------------------------------------------------------------------
  # Claude agents (Node base)
  # -------------------------------------------------------------------------
  hi-aindrea:
    <<: *security
    image: ${CLAUDE_IMAGE:-achaean-claude:latest}
    container_name: hi-aindrea
    hostname: hi-aindrea
    networks: [agamemnon-frontend]
    ports: ["23001:23001"]
    environment:
      <<: *common-env
      AGENT_ID: aindrea
      AGENT_PORT: "23001"
      TMUX_SESSION_NAME: aindrea
      # ANTHROPIC_API_KEY injected by entrypoint from /run/secrets/anthropic_api_key
    secrets:
      - anthropic_api_key
    volumes:
      - ${WORKSPACE_ROOT:-/home/mvillmow}/Agents/Aindrea:/workspace
      - ${TLS_CERT_DIR:-../tls/certs}:/certs:ro
    working_dir: /workspace
    read_only: true
    tmpfs: *tmpfs
    restart: unless-stopped
    logging: *default-logging
    healthcheck: *healthcheck

  hi-eris:
    image: ${CLAUDE_IMAGE:-achaean-claude:latest}
    container_name: hi-eris
    hostname: hi-eris
