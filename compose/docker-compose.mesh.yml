# AchaeanFleet: Full Heterogeneous Mesh Compose
#
# Starts a mixed fleet of all 9 agent types.
# This is the Phase 4 verification target.
#
# Usage:
#   cp .env.example .env && nano .env  (add API keys)
#   bash ../tls/generate-certs.sh      (generate TLS certs, first time only)
#   docker compose \
#     -f docker-compose.caddy.yml \
#     -f docker-compose.mesh.yml \
#     up -d
#
# To pin all images to a specific version, set IMAGE_TAG in .env:
#   IMAGE_TAG=v1.0.0    (semver release — reproducible)
#   IMAGE_TAG=abc1234   (7-char git SHA from CI — traceable)
#   IMAGE_TAG=latest    (default — always the newest build, not pinned)
#
# Check health: docker compose -f docker-compose.mesh.yml ps

version: "3.9"

networks:
  homeric-mesh:
    name: ${MESH_NETWORK:-homeric-mesh}
    driver: bridge

# Shared environment for all agents
x-common-env: &common-env
  AGAMEMNON_URL: ${AGAMEMNON_URL:-https://caddy:8443}
  TLS_CA_CERT: ${TLS_CA_CERT:-/certs/ca.crt}

# Shared cert volume mount (read-only)
x-cert-volume: &cert-volume
  - ${TLS_CERT_DIR:-../tls/certs}:/certs:ro

# Shared healthcheck — validates TLS via Caddy's plain-HTTP health endpoint
# Caddy exposes :2019/health on its internal port, agents use it to confirm
# the TLS proxy is up before marking themselves healthy.
x-healthcheck: &healthcheck
  test: ["CMD", "curl", "-f", "--cacert", "/certs/ca.crt", "https://caddy:8443/health"]
  interval: 30s
  timeout: 5s
  start_period: 15s
  retries: 3

# Shared security hardening (least-privilege defaults)
x-security: &security
  cap_drop: [ALL]
  security_opt: [no-new-privileges:true]

services:
  # -------------------------------------------------------------------------
  # Claude agents (Node base)
  # -------------------------------------------------------------------------
  hi-aindrea:
    image: ${CLAUDE_IMAGE:-achaean-claude:latest}
    container_name: hi-aindrea
    hostname: hi-aindrea
    networks: [homeric-mesh]
    ports: ["23001:23001"]
    environment:
      <<: *common-env
      AGENT_ID: aindrea
      AGENT_PORT: "23001"
      TMUX_SESSION_NAME: aindrea
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - ${WORKSPACE_ROOT:-/home/mvillmow}/Agents/Aindrea:/workspace
      - ${TLS_CERT_DIR:-../tls/certs}:/certs:ro
    working_dir: /workspace
    restart: unless-stopped
    healthcheck: *healthcheck
    <<: *security

  hi-baird:
    image: ${CLAUDE_IMAGE:-achaean-claude:latest}
    container_name: hi-baird
    hostname: hi-baird
    networks: [homeric-mesh]
    ports: ["23003:23001"]
    environment:
      <<: *common-env
      AGENT_ID: baird
      AGENT_PORT: "23001"
      TMUX_SESSION_NAME: baird
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - ${WORKSPACE_ROOT:-/home/mvillmow}/ProjectScylla:/workspace
      - ${TLS_CERT_DIR:-../tls/certs}:/certs:ro
    working_dir: /workspace
    restart: unless-stopped
    healthcheck: *healthcheck
    <<: *security

  # -------------------------------------------------------------------------
  # Codex agent (Node base)
  # -------------------------------------------------------------------------
  hi-codex-1:
    image: ${CODEX_IMAGE:-achaean-codex:latest}
    container_name: hi-codex-1
