      AGENT_ID: codex-1
      AGENT_PORT: "23001"
      TMUX_SESSION_NAME: codex-1
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - ${WORKSPACE_ROOT:-/home/mvillmow}/Agents/Codex-1:/workspace
    working_dir: /workspace
    restart: unless-stopped
    healthcheck: *healthcheck
