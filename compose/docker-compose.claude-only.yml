# AchaeanFleet: Claude-only Compose
#
# Mirrors the current local setup (5 Claude agents).
# This is the Phase 3 verification target: docker compose up starts a Claude
# container that ProjectAgamemnon connects to via the agent sidecar.
#
# Usage:
#   cp .env.example .env && nano .env
#   docker compose -f docker-compose.claude-only.yml up -d
#
# To pin all images to a specific version, set IMAGE_TAG in .env:
#   IMAGE_TAG=v1.0.0    (semver release — reproducible)
#   IMAGE_TAG=abc1234   (7-char git SHA from CI — traceable)
#   IMAGE_TAG=latest    (default — always the newest build, not pinned)

version: "3.9"

networks:
  homeric-mesh:
    name: ${MESH_NETWORK:-homeric-mesh}
    driver: bridge
    # Internal DNS: containers resolve each other by service name

services:
  # -------------------------------------------------------------------------
  # ProjectAgamemnon coordinator (existing, not modified — just connected here)
  # Uncomment if you want to start ProjectAgamemnon from compose too.
  # -------------------------------------------------------------------------
  # hi-agamemnon:
  #   image: agamemnon:latest
  #   ports:
  #     - "8080:8080"
  #   networks:
  #     - homeric-mesh

  # -------------------------------------------------------------------------
  # Claude agent: Aindrea (odyssey-mainline-analysis)
  # -------------------------------------------------------------------------
  hi-aindrea:
    image: ${CLAUDE_IMAGE:-achaean-claude:latest}
    container_name: hi-aindrea
    hostname: hi-aindrea
    networks:
      - homeric-mesh
    ports:
      - "23001:23001"
    environment:
      - AGENT_ID=aindrea
      - AGENT_PORT=23001
      - TMUX_SESSION_NAME=aindrea
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AGAMEMNON_URL=${AGAMEMNON_URL:-http://172.20.0.1:8080}
    volumes:
      - ${WORKSPACE_ROOT:-/home/mvillmow}/Agents/Aindrea:/workspace
    working_dir: /workspace
    restart: unless-stopped
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:23001/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # -------------------------------------------------------------------------
  # Claude agent: Baird (scylla-repo-monitor)
  # -------------------------------------------------------------------------
  hi-baird:
    image: ${CLAUDE_IMAGE:-achaean-claude:latest}
    container_name: hi-baird
    hostname: hi-baird
    networks:
      - homeric-mesh
    ports:
      - "23003:23001"
    environment:
      - AGENT_ID=baird
      - AGENT_PORT=23001
      - TMUX_SESSION_NAME=baird
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AGAMEMNON_URL=${AGAMEMNON_URL:-http://172.20.0.1:8080}
    volumes:
      - ${WORKSPACE_ROOT:-/home/mvillmow}/ProjectScylla:/workspace
    working_dir: /workspace
    restart: unless-stopped
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:23001/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # -------------------------------------------------------------------------
  # Claude agent: VegAI (villmow-general-agent)
  # -------------------------------------------------------------------------
  hi-vegai:
    image: ${CLAUDE_IMAGE:-achaean-claude:latest}
    container_name: hi-vegai
    hostname: hi-vegai
    networks:
      - homeric-mesh
    ports:
      - "23004:23001"
    environment:
      - AGENT_ID=vegai
      - AGENT_PORT=23001
      - TMUX_SESSION_NAME=vegai
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AGAMEMNON_URL=${AGAMEMNON_URL:-http://172.20.0.1:8080}
    volumes:
      - ${WORKSPACE_ROOT:-/home/mvillmow}/Agents/Vegai:/workspace
    working_dir: /workspace
    restart: unless-stopped
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:23001/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
