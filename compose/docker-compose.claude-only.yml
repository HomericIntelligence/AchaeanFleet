# AchaeanFleet: Claude-only Compose
#
# Mirrors the current local setup (3 Claude agents).
# This is the Phase 3 verification target: docker compose up starts a Claude
# container that ProjectAgamemnon connects to via the agent sidecar.
#
# Usage:
#   cp .env.example .env && nano .env
#   docker compose -f docker-compose.claude-only.yml up -d
#
# Network topology:
#   agamemnon-frontend  — all Claude agents; internal DNS resolves by service name
#   agent-backend       — defined but unused in this file; available for future use

version: "3.9"

# Shared security hardening applied to all services
x-security: &security
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

networks:
  agamemnon-frontend:
    driver: bridge
    # Internal DNS: agents resolve each other by service name within this network
  agent-backend:
    driver: bridge

services:
  # -------------------------------------------------------------------------
  # ProjectAgamemnon coordinator (existing, not modified — just connected here)
  # Uncomment if you want to start ProjectAgamemnon from compose too.
  # -------------------------------------------------------------------------
  # hi-agamemnon:
  #   image: agamemnon:latest
  #   ports:
  #     - "8080:8080"
  #   networks:
  #     - agamemnon-frontend

  # -------------------------------------------------------------------------
  # Claude agent: Aindrea (odyssey-mainline-analysis)
  # -------------------------------------------------------------------------
  hi-aindrea:
    <<: *security
    image: ${CLAUDE_IMAGE:-achaean-claude:latest}
    container_name: hi-aindrea
    hostname: hi-aindrea
    networks:
      - agamemnon-frontend
    ports:
      - "23001:23001"
    environment:
      - AGENT_ID=aindrea
      - AGENT_PORT=23001
      - TMUX_SESSION_NAME=aindrea
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AGAMEMNON_URL=${AGAMEMNON_URL:-https://caddy:8443}
      - TLS_CA_CERT=${TLS_CA_CERT:-/certs/ca.crt}
    volumes:
      - ${WORKSPACE_ROOT:-/home/mvillmow}/Agents/Aindrea:/workspace
      - ${TLS_CERT_DIR:-../tls/certs}:/certs:ro
    working_dir: /workspace
    restart: unless-stopped
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    healthcheck:
      test: ["CMD", "curl", "-f", "--cacert", "/certs/ca.crt", "https://caddy:8443/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # -------------------------------------------------------------------------
  # Claude agent: Baird (scylla-repo-monitor)
  # -------------------------------------------------------------------------
  hi-baird:
    <<: *security
    image: ${CLAUDE_IMAGE:-achaean-claude:latest}
    container_name: hi-baird
    hostname: hi-baird
    networks:
      - agamemnon-frontend
    ports:
      - "23003:23001"
    environment:
      - AGENT_ID=baird
      - AGENT_PORT=23001
      - TMUX_SESSION_NAME=baird
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AGAMEMNON_URL=${AGAMEMNON_URL:-https://caddy:8443}
      - TLS_CA_CERT=${TLS_CA_CERT:-/certs/ca.crt}
    volumes:
      - ${WORKSPACE_ROOT:-/home/mvillmow}/ProjectScylla:/workspace
      - ${TLS_CERT_DIR:-../tls/certs}:/certs:ro
    working_dir: /workspace
    restart: unless-stopped
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    healthcheck:
      test: ["CMD", "curl", "-f", "--cacert", "/certs/ca.crt", "https://caddy:8443/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # -------------------------------------------------------------------------
  # Claude agent: VegAI (villmow-general-agent)
  # -------------------------------------------------------------------------
  hi-vegai:
    <<: *security
    image: ${CLAUDE_IMAGE:-achaean-claude:latest}
    container_name: hi-vegai
    hostname: hi-vegai
    networks:
      - agamemnon-frontend
    ports:
      - "23004:23001"
    environment:
      - AGENT_ID=vegai
      - AGENT_PORT=23001
      - TMUX_SESSION_NAME=vegai
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AGAMEMNON_URL=${AGAMEMNON_URL:-https://caddy:8443}
      - TLS_CA_CERT=${TLS_CA_CERT:-/certs/ca.crt}
    volumes:
      - ${WORKSPACE_ROOT:-/home/mvillmow}/Agents/Vegai:/workspace
    working_dir: /workspace
    restart: unless-stopped
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    healthcheck:
      test: ["CMD", "curl", "-f", "--cacert", "/certs/ca.crt", "https://caddy:8443/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
