# AchaeanFleet: Claude-only Compose
#
# Mirrors the current local setup (3 Claude agents).
# This is the Phase 3 verification target: docker compose up starts a Claude
# container that ProjectAgamemnon connects to via the agent sidecar.
#
# Usage:
#   cp .env.example .env && nano .env
#   docker compose -f docker-compose.claude-only.yml up -d
#
# API key secrets:
#   mkdir -p secrets && echo -n "sk-ant-..." > secrets/anthropic_api_key && chmod 600 secrets/anthropic_api_key
#   (set SECRETS_DIR in .env if your secrets dir lives elsewhere)

# Shared security hardening applied to all services
x-security: &security
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

networks:
  agamemnon-frontend:
    driver: bridge
    # Internal DNS: agents resolve each other by service name within this network
  agent-backend:
    driver: bridge

# Shared tmpfs mounts for paths that need write access under read-only root.
# /tmp        - general temp files and tmux sockets (/tmp/tmux-*)
# /run        - runtime PID files and sockets
# /home/agent/.cache  - tool caches (npm, Claude Code, etc.)
# /home/agent/.config - runtime config writes
# /home/agent/.local  - Python user installs and local state
x-tmpfs: &tmpfs
  - /tmp
  - /run
  - /home/agent/.cache
  - /home/agent/.config
  - /home/agent/.local

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "${LOG_MAX_SIZE:-10m}"
    max-file: "${LOG_MAX_FILES:-3}"

secrets:
  anthropic_api_key:
    file: ${SECRETS_DIR:-./secrets}/anthropic_api_key

services:
  # -------------------------------------------------------------------------
  # ProjectAgamemnon coordinator (existing, not modified — just connected here)
  # Uncomment if you want to start ProjectAgamemnon from compose too.
  # -------------------------------------------------------------------------
  # hi-agamemnon:
  #   image: agamemnon:latest
  #   ports:
  #     - "8080:8080"
  #   networks:
  #     - agamemnon-frontend

  # -------------------------------------------------------------------------
  # Claude agent: Aindrea (odyssey-mainline-analysis)
  # -------------------------------------------------------------------------
  hi-aindrea:
    <<: *security
    image: ${CLAUDE_IMAGE:-achaean-claude:latest}
    container_name: hi-aindrea
    hostname: hi-aindrea
    networks:
      - agamemnon-frontend
    ports:
      - "23001:23001"
    environment:
      - AGENT_ID=aindrea
      - AGENT_PORT=23001
      - TMUX_SESSION_NAME=aindrea
      - AGAMEMNON_URL=${AGAMEMNON_URL:-http://172.20.0.1:8080}
      # ANTHROPIC_API_KEY is injected by entrypoint from /run/secrets/anthropic_api_key
      # Fallback: set ANTHROPIC_API_KEY in .env for plain env-var mode
    secrets:
      - anthropic_api_key
    volumes:
      - ${WORKSPACE_ROOT:-/home/mvillmow}/Agents/Aindrea:/workspace
      - ${TLS_CERT_DIR:-../tls/certs}:/certs:ro
    working_dir: /workspace
    read_only: true
    tmpfs: *tmpfs
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "--cacert", "/certs/ca.crt", "https://caddy:8443/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # -------------------------------------------------------------------------
  # Claude agent: Eris (port 23002)
  # -------------------------------------------------------------------------
  hi-eris:
    image: ${CLAUDE_IMAGE:-achaean-claude:latest}
    container_name: hi-eris
    hostname: hi-eris
    networks:
      - homeric-mesh
    ports:
      - "23002:23001"
    environment:
      - AGENT_ID=eris
      - AGENT_PORT=23001
      - TMUX_SESSION_NAME=eris
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AGAMEMNON_URL=${AGAMEMNON_URL:-http://172.20.0.1:8080}
    volumes:
      - ${WORKSPACE_ROOT:-/home/mvillmow}/Agents/Eris:/workspace
    working_dir: /workspace
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:23001/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # -------------------------------------------------------------------------
  # Claude agent: Baird (scylla-repo-monitor)
  # -------------------------------------------------------------------------
  hi-baird:
    <<: *security
    image: ${CLAUDE_IMAGE:-achaean-claude:latest}
    container_name: hi-baird
    hostname: hi-baird
    networks:
      - agamemnon-frontend
    ports:
      - "23003:23001"
    environment:
      - AGENT_ID=baird
      - AGENT_PORT=23001
      - TMUX_SESSION_NAME=baird
      - AGAMEMNON_URL=${AGAMEMNON_URL:-http://172.20.0.1:8080}
      # ANTHROPIC_API_KEY is injected by entrypoint from /run/secrets/anthropic_api_key
    secrets:
      - anthropic_api_key
    volumes:
      - ${WORKSPACE_ROOT:-/home/mvillmow}/ProjectScylla:/workspace
      - ${TLS_CERT_DIR:-../tls/certs}:/certs:ro
    working_dir: /workspace
    read_only: true
    tmpfs: *tmpfs
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "--cacert", "/certs/ca.crt", "https://caddy:8443/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # -------------------------------------------------------------------------
  # Claude agent: VegAI (villmow-general-agent)
  # -------------------------------------------------------------------------
  hi-vegai:
    <<: *security
    image: ${CLAUDE_IMAGE:-achaean-claude:latest}
    container_name: hi-vegai
    hostname: hi-vegai
    networks:
      - agamemnon-frontend
    ports:
      - "23004:23001"
    environment:
      - AGENT_ID=vegai
      - AGENT_PORT=23001
      - TMUX_SESSION_NAME=vegai
      - AGAMEMNON_URL=${AGAMEMNON_URL:-http://172.20.0.1:8080}
      # ANTHROPIC_API_KEY is injected by entrypoint from /run/secrets/anthropic_api_key
    secrets:
      - anthropic_api_key
    volumes:
      - ${WORKSPACE_ROOT:-/home/mvillmow}/Agents/Vegai:/workspace
    working_dir: /workspace
    read_only: true
    tmpfs: *tmpfs
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "--cacert", "/certs/ca.crt", "https://caddy:8443/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # -------------------------------------------------------------------------
  # Claude agent: Pallas (port 23005)
  # -------------------------------------------------------------------------
  hi-pallas:
    image: ${CLAUDE_IMAGE:-achaean-claude:latest}
    container_name: hi-pallas
    hostname: hi-pallas
    networks:
      - homeric-mesh
    ports:
      - "23005:23001"
    environment:
      - AGENT_ID=pallas
      - AGENT_PORT=23001
      - TMUX_SESSION_NAME=pallas
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AGAMEMNON_URL=${AGAMEMNON_URL:-http://172.20.0.1:8080}
    volumes:
      - ${WORKSPACE_ROOT:-/home/mvillmow}/Agents/Pallas:/workspace
    working_dir: /workspace
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:23001/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
