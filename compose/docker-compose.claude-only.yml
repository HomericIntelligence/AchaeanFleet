# AchaeanFleet: Claude-only Compose
#
# Mirrors the current local setup (3 Claude agents).
# This is the Phase 3 verification target: docker compose up starts a Claude
# container that ProjectAgamemnon connects to via the agent sidecar.
#
# Usage:
#   cp .env.example .env && nano .env  (add ANTHROPIC_API_KEY)
#   bash ../tls/generate-certs.sh      (generate TLS certs, first time only)
#   docker compose \
#     -f docker-compose.caddy.yml \
#     -f docker-compose.claude-only.yml \
#     up -d
#
# Agents connect to Caddy (TLS) instead of ProjectAgamemnon directly.
# See tls/README.md for the full TLS architecture.

version: "3.9"

networks:
  homeric-mesh:
    name: ${MESH_NETWORK:-homeric-mesh}
    driver: bridge
    # Internal DNS: containers resolve each other by service name

services:
  # -------------------------------------------------------------------------
  # ProjectAgamemnon coordinator (existing, not modified — just connected here)
  # Uncomment if you want to start ProjectAgamemnon from compose too.
  # -------------------------------------------------------------------------
  # hi-agamemnon:
  #   image: agamemnon:latest
  #   ports:
  #     - "8080:8080"
  #   networks:
  #     - homeric-mesh

  # -------------------------------------------------------------------------
  # Claude agent: Aindrea (odyssey-mainline-analysis)
  # -------------------------------------------------------------------------
  hi-aindrea:
    image: ${CLAUDE_IMAGE:-achaean-claude:latest}
    container_name: hi-aindrea
    hostname: hi-aindrea
    networks:
      - homeric-mesh
    ports:
      - "23001:23001"
    environment:
      - AGENT_ID=aindrea
      - AGENT_PORT=23001
      - TMUX_SESSION_NAME=aindrea
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AGAMEMNON_URL=${AGAMEMNON_URL:-https://caddy:8443}
      - TLS_CA_CERT=${TLS_CA_CERT:-/certs/ca.crt}
    volumes:
      - ${WORKSPACE_ROOT:-/home/mvillmow}/Agents/Aindrea:/workspace
      - ${TLS_CERT_DIR:-../tls/certs}:/certs:ro
    working_dir: /workspace
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "--cacert", "/certs/ca.crt", "https://caddy:8443/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # -------------------------------------------------------------------------
  # Claude agent: Baird (scylla-repo-monitor)
  # -------------------------------------------------------------------------
  hi-baird:
    image: ${CLAUDE_IMAGE:-achaean-claude:latest}
    container_name: hi-baird
    hostname: hi-baird
    networks:
      - homeric-mesh
    ports:
      - "23003:23001"
    environment:
      - AGENT_ID=baird
      - AGENT_PORT=23001
      - TMUX_SESSION_NAME=baird
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AGAMEMNON_URL=${AGAMEMNON_URL:-https://caddy:8443}
      - TLS_CA_CERT=${TLS_CA_CERT:-/certs/ca.crt}
    volumes:
      - ${WORKSPACE_ROOT:-/home/mvillmow}/ProjectScylla:/workspace
      - ${TLS_CERT_DIR:-../tls/certs}:/certs:ro
    working_dir: /workspace
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "--cacert", "/certs/ca.crt", "https://caddy:8443/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # -------------------------------------------------------------------------
  # Claude agent: VegAI (villmow-general-agent)
  # -------------------------------------------------------------------------
  hi-vegai:
    image: ${CLAUDE_IMAGE:-achaean-claude:latest}
    container_name: hi-vegai
    hostname: hi-vegai
    networks:
      - homeric-mesh
    ports:
      - "23004:23001"
    environment:
      - AGENT_ID=vegai
      - AGENT_PORT=23001
      - TMUX_SESSION_NAME=vegai
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AGAMEMNON_URL=${AGAMEMNON_URL:-https://caddy:8443}
      - TLS_CA_CERT=${TLS_CA_CERT:-/certs/ca.crt}
    volumes:
      - ${WORKSPACE_ROOT:-/home/mvillmow}:/workspace
      - ${TLS_CERT_DIR:-../tls/certs}:/certs:ro
    working_dir: /workspace
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "--cacert", "/certs/ca.crt", "https://caddy:8443/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
