# docker-compose.caddy.yml — Caddy TLS-terminating reverse proxy
#
# Overlay this onto any AchaeanFleet compose file to add TLS termination
# for ProjectAgamemnon connections:
#
#   docker compose \
#     -f docker-compose.caddy.yml \
#     -f docker-compose.claude-only.yml \
#     up -d
#
# Prerequisites:
#   1. Run:  bash ../tls/generate-certs.sh
#   2. Set TLS_CERT_DIR in .env (default: ../tls/certs)

version: "3.9"

networks:
  homeric-mesh:
    name: ${MESH_NETWORK:-homeric-mesh}
    driver: bridge

services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy-tls
    hostname: caddy
    networks:
      - homeric-mesh
    ports:
      # TLS termination — agents connect here instead of host:8080
      - "8443:8443"
      # Caddy admin health endpoint (loopback only — not exposed externally)
      - "127.0.0.1:2019:2019"
    environment:
      # URL of ProjectAgamemnon on the host (plain HTTP — Caddy handles TLS)
      AGAMEMNON_HOST_URL: ${AGAMEMNON_HOST_URL:-http://172.20.0.1:8080}
    volumes:
      # Caddyfile (read-only)
      - ../tls/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      # TLS certs generated by tls/generate-certs.sh (read-only)
      - ${TLS_CERT_DIR:-../tls/certs}:/certs:ro
      # Caddy data dir for internal state (ephemeral — ok for self-signed CA use)
      - caddy_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:2019/config || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  caddy_data:
