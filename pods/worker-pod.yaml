# Podman pod spec for a headless worker agent vessel
# Usage: podman play kube pods/worker-pod.yaml
#        just pod-up worker
#
# Worker pods are minimal (~100MB RAM) headless agents for API-only workloads.

apiVersion: v1
kind: Pod
metadata:
  name: achaean-worker-pod
  labels:
    app: achaean-worker
    fleet: homeric-intelligence
spec:
  restartPolicy: OnFailure
  volumes:
    - name: agent-sidecar
      hostPath:
        path: /home/mvillmow/ProjectAgamemnon/agent-sidecar/agent-sidecar
        type: File
    - name: workspace
      emptyDir: {}
  containers:
    - name: worker
      image: achaean-worker:latest
      ports:
        - containerPort: 23080
          hostPort: 23080
          protocol: TCP
      env:
        - name: AGAMEMNON_URL
          value: "http://172.20.0.1:8080"
        - name: AGENT_MODE
          value: "headless"
      volumeMounts:
        - name: agent-sidecar
          mountPath: /app/agent-sidecar
          readOnly: true
        - name: workspace
          mountPath: /workspace
      resources:
        requests:
          memory: "128Mi"
          cpu: "0.25"
        limits:
          memory: "512Mi"
          cpu: "1"
