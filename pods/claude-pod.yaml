# Podman pod spec for a Claude Code agent vessel
# Usage: podman play kube pods/claude-pod.yaml
#        just pod-up claude
#
# This pod provides a single Claude Code agent container.
# This YAML is for local Podman pod orchestration.

apiVersion: v1
kind: Pod
metadata:
  name: achaean-claude-pod
  labels:
    app: achaean-claude
    fleet: homeric-intelligence
spec:
  restartPolicy: OnFailure
  volumes:
    - name: agent-sidecar
      hostPath:
        path: /home/mvillmow/ProjectAgamemnon/agent-sidecar/agent-sidecar
        type: File
    - name: workspace
      emptyDir: {}
    - name: tls-certs
      hostPath:
        # Certs generated by: bash tls/generate-certs.sh
        # Copy tls/certs/ to /etc/achaean/certs on the Podman host
        path: /etc/achaean/certs
        type: Directory
  containers:
    - name: claude
      image: achaean-claude:latest
      ports:
        - containerPort: 23001
          hostPort: 23001
          protocol: TCP
      env:
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: achaean-secrets
              key: anthropic-api-key
              optional: true
        - name: AGAMEMNON_URL
          value: "https://caddy:8443"
        - name: TLS_CA_CERT
          value: "/certs/ca.crt"
        - name: AGENT_PORT
          value: "23001"
      volumeMounts:
        - name: agent-sidecar
          mountPath: /app/agent-sidecar
          readOnly: true
        - name: workspace
          mountPath: /workspace
        - name: tls-certs
          mountPath: /certs
          readOnly: true
      resources:
        requests:
          memory: "512Mi"
          cpu: "0.5"
        limits:
          memory: "4Gi"
          cpu: "2"
